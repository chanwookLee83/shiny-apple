// ── 파일 삭제 (전 탭 공통) ──
function clearFileData(type) {
  const labels = { sort: '선별실적', vq: '업체별 품질현황', fc: '실패비용', hold: 'Hold' };
  if (!confirm((labels[type] || type) + ' 파일을 삭제하시겠습니까?\n다른 PC에서도 파일이 제거됩니다.')) return;
  const wid = _currentSessionId || getWeekId(DB);
  const lsKeys = {
    sort: ['qm_sort_data', 'qm_sess_sort_'],
    vq:   ['qm_vq_data',   'qm_sess_vq_'],
    fc:   ['qm_fc_data',   'qm_sess_fc_'],
    hold: ['qm_hold_data', 'qm_sess_hold_'],
  };
  if (type === 'sort') sortData = null;
  else if (type === 'vq')   vqData   = null;
  else if (type === 'fc')   fcData   = null;
  else if (type === 'hold') holdData = null;
  const [lsKey, sessPrefix] = lsKeys[type] || [];
  try { if (lsKey) localStorage.removeItem(lsKey); } catch(e) {}
  try { if (sessPrefix && wid) { localStorage.removeItem(sessPrefix + wid); localStorage.removeItem(sessPrefix + wid + '_srvts'); } } catch(e) {}
  if (_fdb && wid) {
    // Firestore에 삭제 표시 → 다른 PC도 동기화
    _fdb.collection('qm').doc('file_' + type + '_' + wid).set({
      json: JSON.stringify({ _cleared: true, updatedAt: Date.now() }), type, weekId: wid,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(() => {});
    _fdb.collection('qm').doc('main').set({ fileUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }).catch(() => {});
    // 삭제한 PC 자신은 재pull하지 않도록 방지
    _lastFileUpdatedAtMs = Date.now() + 3000;
  }
  renderAll();
  setTimeout(initCollapsible, 80);
}

// ── 선별실적 파일 처리 ──
function handleSortExcelUpload(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  processSortFile(file);
}
function handleSortExcelDrop(event) {
  const file = event.dataTransfer.files[0];
  if (!file) return;
  processSortFile(file);
}
function processSortFile(file) {
  if (typeof XLSX === 'undefined') { alert('라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array', cellDates:false });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if (!raw || raw.length < 2) { alert('데이터가 없거나 형식이 맞지 않습니다.'); return; }
      const headers = raw[0].map((h,i) => h ? String(h).trim() : `열${i+1}`);
      const rows = raw.slice(1).filter(r => r.some(c => c !== '')).map(r => {
        const obj = {};
        headers.forEach((h,i) => { const v = r[i] ?? ''; if (v !== '') obj[h] = v; });
        return obj;
      });
      const colMap = detectSortColumns(headers);
      sortData = { headers, rows, colMap, fileName: file.name, updatedAt: Date.now() };
      try { localStorage.setItem('qm_sort_data', JSON.stringify(sortData)); } catch(ee) {}
      const _wid = _currentSessionId || getWeekId(DB);
      if (_wid) { try { localStorage.setItem('qm_sess_sort_'+_wid, JSON.stringify(sortData)); localStorage.setItem('qm_sess_sort_'+_wid+'_srvts', String(Date.now())); } catch(ee) {} pushFileDataToFirestore(_wid, 'sort', sortData); }
      renderDefects();
      setTimeout(initCollapsible, 80);
    } catch(err) { alert('파일 처리 중 오류가 발생했습니다:\n' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ── 열 자동 감지 ──
function detectSortColumns(headers) {
  const norm = h => h.toLowerCase().replace(/[\s\-_\/\(\)\'\"]/g,'');
  const find = (...pats) => {
    for (const p of pats) {
      const idx = headers.findIndex(h => norm(h).includes(p));
      if (idx >= 0) return headers[idx];
    }
    return '';
  };
  const defectTypes = {};
  SORT_DEFECT_COLS.forEach(col => {
    const match = headers.find(h => h.trim() === col);
    if (match) defectTypes[col] = match;
  });
  return {
    date:      find('선별일','날짜','일자','date'),
    workplace: find('작업장명','작업장','공정명','공정','부서명','부서','담당부서','사업장','라인명','라인','line','process','section'),
    worker:    find('작업자명','작업자','검사원','작업원','사원명','사원','담당자','검사자','작업담당','inspector','operator','worker'),
    partNo:    find('품목','품번','partno','자재번호'),
    partName:  find('품목명','품명','partname'),
    inspQty:   find('검사수량'),
    defectQty: find('불량수량'),
    defectAmt: find('불량금액'),
    defectPpm: find('불량율','ppm'),
    defectTypes,
  };
}

// ── 분석 로직 ──
function buildSortAnalysis(data) {
  const { rows, headers } = data;
  // 기존 colMap에서 누락된 열은 headers로 재감지
  const colMap = Object.assign({}, data.colMap);
  if (headers && headers.length > 0) {
    const detected = detectSortColumns(headers);
    if (!colMap.workplace && detected.workplace) colMap.workplace = detected.workplace;
    if (!colMap.worker   && detected.worker)    colMap.worker    = detected.worker;
  }
  let totalInspQty = 0, totalDefectQty = 0, totalDefectAmt = 0;
  const defectTypeTotals = {};
  SORT_DEFECT_COLS.forEach(t => { defectTypeTotals[t] = 0; });
  const partMap = {};
  const workplaceMap = {};
  const workerMap = {};

  rows.forEach(row => {
    const inspQty   = parseMoney(row[colMap.inspQty])   || 0;
    const defectQty = parseMoney(row[colMap.defectQty]) || 0;
    const defectAmt = parseMoney(row[colMap.defectAmt]) || 0;
    const partNo    = String(row[colMap.partNo]   || '').trim() || '미상';
    const partName  = String(row[colMap.partName] || '').trim();

    totalInspQty   += inspQty;
    totalDefectQty += defectQty;
    totalDefectAmt += defectAmt;

    SORT_DEFECT_COLS.forEach(t => {
      const col = colMap.defectTypes?.[t];
      if (col) defectTypeTotals[t] += (parseMoney(row[col]) || 0);
    });

    if (!partMap[partNo]) partMap[partNo] = { partNo, partName, inspQty:0, defectQty:0, defectAmt:0 };
    partMap[partNo].inspQty   += inspQty;
    partMap[partNo].defectQty += defectQty;
    partMap[partNo].defectAmt += defectAmt;

    const workplace = String(row[colMap.workplace] || '').trim();
    const worker    = String(row[colMap.worker]    || '').trim();
    if (workplace) {
      if (!workplaceMap[workplace]) workplaceMap[workplace] = { name: workplace, inspQty:0, defectQty:0, defectAmt:0 };
      workplaceMap[workplace].inspQty   += inspQty;
      workplaceMap[workplace].defectQty += defectQty;
      workplaceMap[workplace].defectAmt += defectAmt;
    }
    if (worker) {
      if (!workerMap[worker]) workerMap[worker] = { name: worker, inspQty:0, defectQty:0, defectAmt:0 };
      workerMap[worker].inspQty   += inspQty;
      workerMap[worker].defectQty += defectQty;
      workerMap[worker].defectAmt += defectAmt;
    }
  });

  const avgPpm = totalInspQty > 0 ? Math.round(totalDefectQty / totalInspQty * 1000000) : 0;
  const defectTypeList = SORT_DEFECT_COLS
    .map(t => ({ type: t, count: defectTypeTotals[t] }))
    .filter(d => d.count > 0)
    .sort((a,b) => b.count - a.count);
  const parts = Object.values(partMap).sort((a,b) => b.defectQty - a.defectQty);
  const workplaces = Object.values(workplaceMap).sort((a,b) => b.defectQty - a.defectQty);
  const workers    = Object.values(workerMap).sort((a,b) => b.defectQty - a.defectQty);

  return { totalInspQty, totalDefectQty, totalDefectAmt, avgPpm, defectTypeList, parts, workplaces, workers, rowCount: rows.length };
}

// ── 차트 ──
function initSortCharts(analysis) {
  const isLight = document.body.classList.contains('light');
  const gc = isLight ? '#e2e8f0' : '#1e2d4a';
  const tc = isLight ? '#475569' : '#94a3b8';
  const PAL = ['#ef4444','#f59e0b','#22c55e','#2563eb','#a855f7','#06b6d4','#f97316','#84cc16','#ec4899','#14b8a6'];
  const el = document.getElementById('chartSortBar');
  if (!el) return;
  const c = Chart.getChart('chartSortBar'); if (c) c.destroy();
  const labels = analysis.defectTypeList.map(d => d.type);
  const counts = analysis.defectTypeList.map(d => d.count);
  const colors = analysis.defectTypeList.map((_,i) => PAL[i % PAL.length]);
  new Chart('chartSortBar', {
    type: 'bar',
    data: { labels, datasets: [{ label: '불량수량', data: counts, backgroundColor: colors.map(c=>c+'cc'), borderRadius: 4 }] },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw.toLocaleString()}개` } } },
      scales: {
        x: { grid: { color: gc }, ticks: { color: tc } },
        y: { grid: { display: false }, ticks: { color: tc } }
      }
    }
  });
}

// ── 열 매핑 모달 ──
function openSortColMapModal() {
  if (!sortData) return;
  const noneOpt = '(없음)';
  const opts = [noneOpt, ...sortData.headers];
  const schema = [
    {k:'date',      l:'선별일 열',          t:'select', opts},
    {k:'workplace', l:'작업장명 열',         t:'select', opts},
    {k:'worker',    l:'작업자 열',           t:'select', opts},
    {k:'partNo',    l:'품목(품번) 열',       t:'select', opts},
    {k:'partName',  l:'품목명 열',           t:'select', opts},
    {k:'inspQty',   l:'검사수량 열',         t:'select', opts},
    {k:'defectQty', l:'불량수량 열',         t:'select', opts},
    {k:'defectAmt', l:'불량금액 열',         t:'select', opts},
    {k:'defectPpm', l:'불량율(PPM) 열',      t:'select', opts},
  ];
  // 불량 유형 열 매핑 추가 (감지된 것만)
  const detectedTypes = SORT_DEFECT_COLS.filter(t => sortData.colMap.defectTypes?.[t]);
  const missingTypes  = SORT_DEFECT_COLS.filter(t => !sortData.colMap.defectTypes?.[t]);
  if (missingTypes.length > 0) {
    missingTypes.forEach(t => schema.push({k:'_dt_'+t, l:`불량유형: ${t}`, t:'select', opts}));
  }
  const cur = {};
  Object.entries(sortData.colMap).forEach(([k,v]) => {
    if (k !== 'defectTypes') cur[k] = v || noneOpt;
  });
  (sortData.colMap.defectTypes||{});
  SORT_DEFECT_COLS.forEach(t => {
    cur['_dt_'+t] = sortData.colMap.defectTypes?.[t] || noneOpt;
  });

  openModal('선별실적 열 매핑 설정', schema, cur, result => {
    Object.entries(result).forEach(([k,v]) => {
      if (k.startsWith('_dt_')) {
        const type = k.slice(4);
        if (!sortData.colMap.defectTypes) sortData.colMap.defectTypes = {};
        sortData.colMap.defectTypes[type] = v === noneOpt ? '' : v;
      } else {
        sortData.colMap[k] = v === noneOpt ? '' : v;
      }
    });
    try { localStorage.setItem('qm_sort_data', JSON.stringify(sortData)); } catch(ee) {}
    const _wid = _currentSessionId || getWeekId(DB);
    if (_wid) { try { localStorage.setItem('qm_sess_sort_'+_wid, JSON.stringify(sortData)); localStorage.setItem('qm_sess_sort_'+_wid+'_srvts', String(Date.now())); } catch(ee) {} pushFileDataToFirestore(_wid, 'sort', sortData); }
    renderDefects();
    setTimeout(initCollapsible, 80);
  });
}

// 4M 등록 데이터 → 월별 자동 집계
function calcFourMMonthlyAuto() {
  const fm = DB.fourm || [];
  const monthMap = {}; // 'YYYY-MM' -> {Man,Machine,Material,Method}

  fm.forEach(f => {
    if (!f.date) return;
    const d = String(f.date).trim();
    const m = d.match(/(\d{4})[.\-\/](\d{1,2})/);
    if (!m) return;
    const key = `${m[1]}-${String(m[2]).padStart(2,'0')}`;
    if (!monthMap[key]) monthMap[key] = {Man:0,Machine:0,Material:0,Method:0};
    const t = f.type;
    if (monthMap[key][t] !== undefined) monthMap[key][t]++;
  });

  // 데이터가 없으면 현재 연도 1~12월 빈 데이터 반환
  if (!Object.keys(monthMap).length) {
    const yr = new Date().getFullYear();
    const labels = Array.from({length:12},(_,i)=>`${yr}-${String(i+1).padStart(2,'0')}`);
    return { labels, man:labels.map(()=>0), machine:labels.map(()=>0), material:labels.map(()=>0), method:labels.map(()=>0) };
  }

  const labels = Object.keys(monthMap).sort();
  return {
    labels,
    man:      labels.map(k => monthMap[k].Man      || 0),
    machine:  labels.map(k => monthMap[k].Machine  || 0),
    material: labels.map(k => monthMap[k].Material || 0),
    method:   labels.map(k => monthMap[k].Method   || 0),
  };
}

function renderFourMAutoTable() {
  const auto = calcFourMMonthlyAuto();
  if (auto.labels.every((_, i) => auto.man[i]+auto.machine[i]+auto.material[i]+auto.method[i] === 0)) {
    return `<div style="text-align:center;padding:18px;color:var(--text-dim);font-size:.82rem">4M 변경점을 등록하면 자동으로 집계됩니다.</div>`;
  }
  const types = [
    {key:'man',      label:'Man',      color:'#a855f7'},
    {key:'machine',  label:'Machine',  color:'#2563eb'},
    {key:'material', label:'Material', color:'#f59e0b'},
    {key:'method',   label:'Method',   color:'#22c55e'},
  ];
  const totals = auto.labels.map((_,i) => auto.man[i]+auto.machine[i]+auto.material[i]+auto.method[i]);
  const grandTotal = totals.reduce((s,v)=>s+v,0);
  const thead = auto.labels.map(l=>`<th style="text-align:center;min-width:54px">${esc(l.replace(/^\d{4}-/,''))}</th>`).join('');
  const tbody = types.map(t => {
    const cells = auto.labels.map((_,i)=>{
      const v = auto[t.key][i];
      return `<td style="text-align:center;color:${v>0?t.color:'var(--text-dim)'}">${v>0?v:'—'}</td>`;
    }).join('');
    const rowTotal = auto.labels.reduce((s,_,i)=>s+auto[t.key][i],0);
    return `<tr><td><span style="font-size:.7rem;font-weight:800;padding:2px 8px;border-radius:10px;background:${t.color}22;color:${t.color}">${t.label}</span></td>${cells}<td style="text-align:center;font-weight:700;color:${t.color}">${rowTotal||'—'}</td></tr>`;
  }).join('');
  const tfoot = auto.labels.map((_,i)=>{
    return `<td style="text-align:center;font-weight:700;color:#60a5fa">${totals[i]||'—'}</td>`;
  }).join('');
  return `
  <div style="overflow-x:auto">
  <table class="tbl tbl-nowrap" style="font-size:.78rem">
    <thead><tr><th>구분</th>${thead}<th style="text-align:center">합계</th></tr></thead>
    <tbody>${tbody}</tbody>
    <tfoot><tr style="border-top:1px solid var(--border)"><td style="font-weight:700">월 합계</td>${tfoot}<td style="text-align:center;font-weight:800;color:#ef4444">${grandTotal}</td></tr></tfoot>
  </table>

      <div class="act-cell">${actCell(`editIssue(${iss.id})`,`delRow('issues',${iss.id})`)}</div>
    </div>`).join('');

  const statusColor = {미착수:'#6b7280',진행중:'#f59e0b',완료:'#22c55e'};
  const actRows = DB.actions.map((a,i) => {
    const st = a.status || '미착수';
    const stStyle = `color:${statusColor[st]};font-weight:700`;
    return `<tr style="${st==='완료'?'opacity:.6':''}" >
    <td>${i+1}</td>
    <td>${esc(a.content)}</td><td>${esc(a.responsible)}</td>
    <td style="color:${a.priority==='최우선'||a.priority==='긴급'?'#f87171':'inherit'}">${esc(a.deadline)}</td>
    <td>${badge(a.priority)}</td>
    <td style="${stStyle}">${st}</td>
    <td>${actCell(`editAction(${a.id})`,`delRow('actions',${a.id})`)}</td>
  </tr>`;
  }).join('');

  const schRows = DB.schedule.map(s => `<tr>
    <td>${esc(s.date)}</td><td>${esc(s.category)}</td><td>${esc(s.content)}</td>
    <td>${esc(s.responsible)}</td><td>${badge(s.priority)}</td>
    <td>${actCell(`editSchedule(${s.id})`,`delRow('schedule',${s.id})`)}</td>
  </tr>`).join('');

  // 이슈 + 일정 + Action Items 전체 합산
  const isUrgent = x => ['긴급','최우선','D/L'].includes(x.priority);
  const isImport = x => x.priority === '중요';
  const isNormal = x => ['일반','만회'].includes(x.priority);
  const all = [...(DB.issues||[]), ...(DB.actions||[]), ...(DB.schedule||[])];
  const urgentCount = all.filter(isUrgent).length;
  const importCount = all.filter(isImport).length;
  const normalCount = all.filter(isNormal).length;

  // Action Items 완료율
  const acts = DB.actions || [];
  const actTotal = acts.length;
  const actDone  = acts.filter(a => a.status === '완료').length;
  const actPct   = actTotal > 0 ? Math.round(actDone/actTotal*100) : 0;
  const actPctColor = actPct >= 80 ? '#22c55e' : actPct >= 50 ? '#f59e0b' : '#ef4444';

  document.getElementById('tab-issues').innerHTML = `
    <div class="page-hdr"><h2>주요 이슈 및 조치</h2></div>
    <div class="g4 sp">

      <div class="kpi" style="--kc:#22c55e"><div class="kpi-icon">🟢</div><div class="kpi-lbl">일반</div><div class="kpi-val">${normalCount}건</div><div class="kpi-sub">이슈·일정·Action 합산</div></div>
      <div class="kpi" style="--kc:${actPctColor}"><div class="kpi-icon">✅</div><div class="kpi-lbl">Action 완료율</div><div class="kpi-val" style="color:${actPctColor}">${actPct}%</div><div class="kpi-sub">${actDone}/${actTotal}건 완료</div></div>
    </div>
    <div class="card">
      <div class="card-hdr">
        <span class="card-title">⚠️ 이슈 목록</span>
        ${addRowBtn('이슈 추가','addIssue()')}
      </div>
      ${issuesHtml}
    </div>
    <div class="card">
      <div class="card-hdr">
        <span class="card-title">📅 차주 주요 일정</span>
        ${addRowBtn('일정 추가','addSchedule()')}
      </div>
      <div style="overflow-x:auto">
      <table class="tbl">
        <thead><tr><th>일자</th><th>항목</th><th>내용</th><th>담당</th><th>중요도</th><th>편집</th></tr></thead>
        <tbody>${schRows}</tbody>
      </table>
      </div>
    </div>
    <div class="card" style="background:linear-gradient(135deg,rgba(37,99,235,.07),rgba(6,182,212,.04));border-color:rgba(37,99,235,.3)">

// FONT SIZE
// ═══════════════════════════════════════════════
const BASE_FONT_PX = 14;
const FONT_MIN_PCT = 70;
const FONT_MAX_PCT = 150;
const FONT_STEP_PCT = 5;
let fontPct = parseInt(localStorage.getItem('qm_font_pct') || '100', 10);
if (!Number.isFinite(fontPct)) fontPct = 100;

function applyFontSize() {
  const px = (BASE_FONT_PX * fontPct / 100).toFixed(2);
  document.documentElement.style.fontSize = px + 'px';
  const inp = document.getElementById('fontSizeInput');
  if (inp) inp.value = String(fontPct);
  const resetBtn = document.getElementById('fontResetBtn');
  if (resetBtn) resetBtn.classList.toggle('active-size', fontPct !== 100);
  localStorage.setItem('qm_font_pct', String(fontPct));
}

function setFontSize(dir) {
  if (dir === 0) {
    fontPct = 100;
  } else {
    fontPct = Math.max(FONT_MIN_PCT, Math.min(FONT_MAX_PCT, fontPct + (dir > 0 ? FONT_STEP_PCT : -FONT_STEP_PCT)));
  }
  applyFontSize();
}

function setFontSizeInput(v) {
  const n = parseInt(v, 10);
  if (!Number.isFinite(n)) {
    applyFontSize();
    return;
  }
  const snapped = Math.round(n / FONT_STEP_PCT) * FONT_STEP_PCT;
  fontPct = Math.max(FONT_MIN_PCT, Math.min(FONT_MAX_PCT, snapped));
  applyFontSize();
}

// ── 분석 로직 ──
function buildVqAnalysis(data) {
  const { rows, colMap } = data;
  const vendorMap = {};

  rows.forEach(row => {
    const vendor   = String(row[colMap.vendor]   || '').trim() || '미상';
    const partNo   = String(row[colMap.partNo]   || '').trim();
    const partName = String(row[colMap.partName] || '').trim();
    const partKey  = partNo || partName || '미상';

    if (!vendorMap[vendor]) vendorMap[vendor] = { name: vendor, parts: {} };
    if (!vendorMap[vendor].parts[partKey]) {
      vendorMap[vendor].parts[partKey] = { partNo, partName, processQty: 0, processAmt: 0, sortQty: 0, sortAmt: 0 };
    }
    const processQty = parseMoney(row[colMap.processQty]);
    const processAmt = parseMoney(row[colMap.processAmt]);
    const sortQty    = parseMoney(row[colMap.sortQty]);
    const sortAmt    = parseMoney(row[colMap.sortAmt]);
    vendorMap[vendor].parts[partKey].processQty += processQty;
    vendorMap[vendor].parts[partKey].processAmt += processAmt;
    vendorMap[vendor].parts[partKey].sortQty    += sortQty;
    vendorMap[vendor].parts[partKey].sortAmt    += sortAmt;
  });

  const vendors = Object.values(vendorMap).map(v => {
    const parts = Object.values(v.parts).map(p => ({
      ...p,
      totalCost: p.processAmt + p.sortAmt
    })).sort((a, b) => b.totalCost - a.totalCost);
    const totalCost = parts.reduce((s, p) => s + p.totalCost, 0);
    const totalQty  = parts.reduce((s, p) => s + p.processQty + p.sortQty, 0);
    return { name: v.name, parts, totalCost, totalQty };
  }).sort((a, b) => b.totalCost - a.totalCost);

  const grandTotalCost = vendors.reduce((s, v) => s + v.totalCost, 0);
  const grandTotalQty  = vendors.reduce((s, v) => s + v.totalQty, 0);
  return { vendors, grandTotalCost, grandTotalQty, rowCount: rows.length };
}

// ── 열 자동 감지 ──
function detectVqColumns(headers) {
  const lw = headers.map(h => h.toLowerCase().replace(/[\s_\-\(\)]/g,''));
  const find = (...pats) => {
    for (const p of pats) {
      const idx = lw.findIndex(h => h.includes(p));
      if (idx >= 0) return headers[idx];
    }
    return '';
  };
  return {
    vendor:     find('공정처','업체','vendor','공급','supplier','거래처','협력사'),
    partNo:     find('품목','품번','partno','자재번호','코드','part_no'),
    partName:   find('품목명','품명','partname','부품명','자재명','part_name'),
    processQty: find('공정불량수량','공정불량','공정수량','processqty'),
    processAmt: find('금액(1)','공정금액','공정금','processamt'),
    sortQty:    find('선별불량수량','선별불량','선별수량','sortqty'),
    sortAmt:    find('금액(2)','선별금액','선별금','sortamt'),
  };
}

// ── 파일 처리 ──
function handleVqExcelUpload(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  processVqFile(file);
}
function handleVqExcelDrop(event) {
  const file = event.dataTransfer.files[0];
  if (!file) return;
  processVqFile(file);
}
function processVqFile(file) {
  if (typeof XLSX === 'undefined') {
    alert('라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type:'array', cellDates:false });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if (!raw || raw.length < 2) {
        alert('데이터가 없거나 형식이 맞지 않습니다.\n헤더 행 + 데이터 행이 있는 파일을 사용하세요.');
        return;
      }
      const rawHdr = raw[0].map((h,i) => h ? String(h).trim() : `열${i+1}`);
      // 중복 헤더 처리: 금액(1), 금액(2) 등으로 구분
      const hdrCount = {};
      rawHdr.forEach(h => { hdrCount[h] = (hdrCount[h] || 0) + 1; });
      const hdrIdx = {};
      const headers = rawHdr.map(h => {
        if (hdrCount[h] > 1) { hdrIdx[h] = (hdrIdx[h] || 0) + 1; return `${h}(${hdrIdx[h]})`; }
        return h;
      });
      const rows = raw.slice(1).filter(r => r.some(c => c !== '')).map(r => {
        const obj = {};
        headers.forEach((h,i) => { obj[h] = r[i] ?? ''; });
        return obj;
      });
      const colMap = detectVqColumns(headers);
      vqData = { headers, rows, colMap, fileName: file.name, updatedAt: Date.now() };
      try { localStorage.setItem('qm_vq_data', JSON.stringify(vqData)); } catch(e) {}
      const _vqWid = _currentSessionId || getWeekId(DB);
      if (_vqWid) { try { localStorage.setItem('qm_sess_vq_'+_vqWid, JSON.stringify(vqData)); localStorage.setItem('qm_sess_vq_'+_vqWid+'_srvts', String(Date.now())); } catch(e) {} pushFileDataToFirestore(_vqWid, 'vq', vqData); }
      renderVendorQuality();
      renderDashboard();
      setTimeout(initCollapsible, 80);
    } catch(err) {
      alert('파일 처리 중 오류가 발생했습니다:\n' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

  let totalQty = 0, totalCost = 0;
  const byVendor = {}, byReason = {}, byStatus = {};
  const PAL_STATUS = { '대기':'#ef4444','진행중':'#f59e0b','해제':'#22c55e','폐기':'#6b7280','검토중':'#2563eb' };

  rows.forEach(row => {
    const qty    = parseMoney(row[colMap.holdQty])  || 1;
    const cost   = parseMoney(row[colMap.holdCost]) || 0;
    const vendor = String(row[colMap.vendor]  || '미지정').trim() || '미지정';
    const reason = String(row[colMap.reason]  || '미분류').trim() || '미분류';
    const status = String(row[colMap.status]  || '대기').trim()   || '대기';
    totalQty  += qty;
    totalCost += cost;
    if (!byVendor[vendor])  byVendor[vendor]  = { qty:0, count:0, cost:0 };
    byVendor[vendor].qty += qty; byVendor[vendor].count++; byVendor[vendor].cost += cost;
    if (!byReason[reason])  byReason[reason]  = { qty:0, count:0, cost:0 };
    byReason[reason].qty += qty; byReason[reason].count++; byReason[reason].cost += cost;
    if (!byStatus[status])  byStatus[status]  = { qty:0, count:0 };
    byStatus[status].qty += qty; byStatus[status].count++;
  });

  const vendors  = Object.entries(byVendor).map(([n,v])=>({name:n,...v})).sort((a,b)=>b.qty-a.qty);
  const reasons  = Object.entries(byReason).map(([n,v])=>({name:n,...v})).sort((a,b)=>b.qty-a.qty);
  const statuses = Object.entries(byStatus).map(([n,v])=>({name:n,...v,color:PAL_STATUS[n]||'#94a3b8'}));
  const waitQty    = (byStatus['대기']?.qty||0) + (byStatus['검토중']?.qty||0);
  const releaseQty = byStatus['해제']?.qty||0;
  const disposeQty = byStatus['폐기']?.qty||0;
  const releaseRate = totalQty > 0 ? (releaseQty / totalQty * 100).toFixed(1) : '0.0';
  return { totalQty, totalCount:rows.length, totalCost, vendors, reasons, statuses, waitQty, releaseQty, disposeQty, releaseRate };
}

function handleHoldUpload(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  processHoldFile(file);
}
function handleHoldDrop(event) {
  const file = event.dataTransfer.files[0];
  if (!file) return;
  processHoldFile(file);
}
function processHoldFile(file) {
  if (typeof XLSX === 'undefined') { alert('라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type:'array', cellDates:false });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if (!raw || raw.length < 2) { alert('데이터가 없거나 형식이 맞지 않습니다.\n헤더 행 + 데이터 행이 있는 파일을 사용하세요.'); return; }
      const headers = raw[0].map((h,i) => h ? String(h).trim() : `열${i+1}`);
      const rows = raw.slice(1).filter(r=>r.some(c=>c!=='')).map(r => {
        const obj={}; headers.forEach((h,i)=>{ obj[h]=r[i]??''; }); return obj;
      });
      holdData = { headers, rows, colMap: detectHoldColumns(headers), fileName: file.name, updatedAt: Date.now() };
      try { localStorage.setItem('qm_hold_data', JSON.stringify(holdData)); } catch(e) {}
      const _wid = _currentSessionId || getWeekId(DB);
      if (_wid) { try { localStorage.setItem('qm_sess_hold_'+_wid, JSON.stringify(holdData)); localStorage.setItem('qm_sess_hold_'+_wid+'_srvts', String(Date.now())); } catch(e) {} pushFileDataToFirestore(_wid, 'hold', holdData); }
      renderHoldStatus();
      setTimeout(initCollapsible, 80);
    } catch(err) { alert('파일 처리 중 오류가 발생했습니다:\n' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ── 분석 로직 (품번별 집계) ──
function buildFcAnalysis(data) {
  const { rows, colMap } = data;
  const map = {};
  const INTERNAL_KEYS = ['costInProcess','costAfterProcess','costUserDefect','costReturned','costRegen','costSorting'];
  const OTHER_KEYS    = ['costFreeIssue','costResinLoss','costPaintLoss','costSampleDispose','costInventoryAdj','costOther'];
  const hasDirectCosts = FC_COST_COLS.some(c => colMap[c.key]);

  rows.forEach(row => {
    const partNo   = String(row[colMap.partNo]   || '').trim();
    const partName = String(row[colMap.partName] || '').trim();
    const key = partNo || partName;
    if (!key) return;

    if (!map[key]) {
      map[key] = {
        partNo, partName,
        partGroup: String(row[colMap.partGroup] || '').trim(),
        spec:      String(row[colMap.spec]      || '').trim(),
        dept:      String(row[colMap.dept]      || '').trim(),
        partType:  String(row[colMap.partType]  || '').trim(),
        unitCost: 0, defectQty: 0, costs: {}, qtys: {}
      };
      FC_COST_COLS.forEach(c => { map[key].costs[c.key] = 0; });
      FC_QTY_COLS.forEach(c => { map[key].qtys[c.key] = 0; });
    }

    const unitCost  = parseMoney(row[colMap.unitCost]);
    const defectQty = parseMoney(row[colMap.defectQty]);
    if (unitCost > 0 && map[key].unitCost === 0) map[key].unitCost = unitCost;
    map[key].defectQty += defectQty;
    FC_COST_COLS.forEach(c => {
      if (colMap[c.key]) map[key].costs[c.key] += parseMoney(row[colMap[c.key]]);
    });
    FC_QTY_COLS.forEach(c => {
      if (colMap[c.key]) map[key].qtys[c.key] += parseMoney(row[colMap[c.key]]);
    });
  });

  const parts = Object.values(map).map(p => {
    const directTotal  = FC_COST_COLS.reduce((s, c) => s + (p.costs[c.key] || 0), 0);
    const calcTotal    = p.defectQty * p.unitCost;
    const totalCost    = (hasDirectCosts && directTotal > 0) ? directTotal : calcTotal;
    const internalCost = INTERNAL_KEYS.reduce((s, k) => s + (p.costs[k] || 0), 0);
    const otherCost    = OTHER_KEYS.reduce((s, k) => s + (p.costs[k] || 0), 0);
    const directQtyTotal = FC_QTY_COLS.reduce((s, c) => s + (p.qtys[c.key] || 0), 0);
    return { ...p, totalCost, internalCost, otherCost, directTotal, calcTotal, directQtyTotal };
  }).sort((a, b) => b.totalCost - a.totalCost);

  const grandTotalCost    = parts.reduce((s, p) => s + p.totalCost, 0);
  const grandTotalQty     = parts.reduce((s, p) => s + p.defectQty, 0);
  const grandInternalCost = parts.reduce((s, p) => s + p.internalCost, 0);
  const grandOtherCost    = parts.reduce((s, p) => s + p.otherCost, 0);
  const costByType = FC_COST_COLS.map(c => ({
    ...c, total: parts.reduce((s, p) => s + (p.costs[c.key] || 0), 0)
  })).filter(c => c.total > 0);

  const hasDirectQtys = FC_QTY_COLS.some(c => colMap[c.key]);
  const qtyByType = FC_QTY_COLS.map(c => ({
    ...c, total: parts.reduce((s, p) => s + (p.qtys[c.key] || 0), 0)
  })).filter(c => c.total > 0);

  return { parts, grandTotalCost, grandTotalQty, grandInternalCost, grandOtherCost,
           rowCount: rows.length, hasDirectCosts, costByType, hasDirectQtys, qtyByType };
}

function parseMoney(val) {
  if (!val && val !== 0) return 0;
  return parseFloat(String(val).replace(/[₩,\s원개]/g,'')) || 0;
}

// ── 파일 처리 ──
function handleExcelUpload(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  processFcFile(file);
}
function handleExcelDrop(event) {
  const file = event.dataTransfer.files[0];
  if (!file) return;
  processFcFile(file);
}
function processFcFile(file) {
  if (typeof XLSX === 'undefined') {
    alert('라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type:'array', cellDates:false });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if (!raw || raw.length < 2) { alert('데이터가 없거나 형식이 맞지 않습니다.\n헤더 행 + 데이터 행이 있는 파일을 사용하세요.'); return; }
      // 헤더 행 자동 감지 (멀티레벨 헤더 대응)
      const FC_HDR_KW = ['자공정','후공정','유저불량','해체반입','재생','선별','무상출고','레진유실','도료유실','시료','재고조정'];
      let hdrIdx = 0;
      for (let i = 0; i < Math.min(raw.length, 5); i++) {
        const rowStr = raw[i].map(c => String(c||'').replace(/\s/g,'')).join(' ');
        if (FC_HDR_KW.some(k => rowStr.includes(k))) { hdrIdx = i; break; }
      }
      // 중복 열명 처리: 동일 열명 → _2, _3 접미사 (비용/수량 컬럼 구분)
      const _rawHdrs = raw[hdrIdx].map((h,i) => h ? String(h).trim() : `열${i+1}`);
      const _hdrCount = {};
      const headers = _rawHdrs.map(h => {
        if (!_hdrCount[h]) { _hdrCount[h] = 1; return h; }
        _hdrCount[h]++;
        return `${h}_${_hdrCount[h]}`;
      });
      const rows = raw.slice(hdrIdx + 1).filter(r=>r.some(c=>c!=='')).map(r=>{
        const obj={};
        headers.forEach((h,i)=>{ obj[h]=r[i]??''; });
        return obj;
      });
      const colMap = detectFcColumns(headers);
      // 이전에 수동 저장된 매핑이 있으면 자동감지 결과 위에 덮어씌움 (재업로드 후에도 유지)
      try {
        const _savedMap = localStorage.getItem('qm_fc_colmap_manual');
        if (_savedMap) Object.assign(colMap, JSON.parse(_savedMap));
      } catch(e) {}
      fcData = { headers, rows, colMap, fileName: file.name, updatedAt: Date.now() };
      try { localStorage.setItem('qm_fc_data', JSON.stringify(fcData)); } catch(e) {}
      const _fcWid = _currentSessionId || getWeekId(DB);
      if (_fcWid) { try { localStorage.setItem('qm_sess_fc_'+_fcWid, JSON.stringify(fcData)); localStorage.setItem('qm_sess_fc_'+_fcWid+'_srvts', String(Date.now())); } catch(e) {} pushFileDataToFirestore(_fcWid, 'fc', fcData); }
      renderFailureAnalysis();
      setTimeout(initCollapsible, 80);
    } catch(err) {
      alert('파일 처리 중 오류가 발생했습니다:\n' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── 열 자동 감지 ──
function detectFcColumns(headers) {
  const lw = headers.map(h => h.toLowerCase().replace(/[\s_\-\(\)\/]/g,''));
  const find = (...pats) => {
    for (const p of pats) {
      const idx = lw.findIndex(h => h.includes(p));
      if (idx >= 0) return headers[idx];
    }
    return '';
  };
  return {

    <div class="it-card-hdr">
      <strong style="font-family:monospace;color:var(--accent-cyan);font-size:.95rem">${esc(issue.partNo)||'(품번 없음)'}</strong>
      ${issue.partName ? `<span style="font-weight:600">${esc(issue.partName)}</span>` : ''}
      <span class="it-badge ${esc(issue.status)}">${esc(issue.status)}</span>
      <span style="color:var(--text-muted);font-size:.77rem;margin-left:auto">${esc(issue.createdAt)||''}</span>
      <button class="btn-sec" style="font-size:.74rem;padding:3px 10px" onclick="itCycleStatus(${issue.id})">상태 변경</button>
      <button class="btn-sec" style="font-size:.74rem;padding:3px 10px;color:#ef4444;border-color:rgba(239,68,68,.35)" onclick="itDelete(${issue.id})">삭제</button>
    </div>
    <div class="it-meta">

      <div><span style="color:var(--text-muted)">발생 일자</span><br><strong>${esc(issue.occDate)||'—'}</strong></div>
      <div><span style="color:var(--text-muted)">DATE CODE</span><br><code>${esc(issue.dateCode)||'—'}</code></div>
      <div><span style="color:var(--text-muted)">수량</span><br><strong style="color:#ef4444">${issue.qty ? Number(issue.qty).toLocaleString()+'개' : '—'}</strong></div>
    </div>
    ${issue.problem ? `<div class="it-problem">${esc(issue.problem)}</div>` : ''}
    ${issue.photos&&issue.photos.length ? `<div class="it-photos">${photos}</div>` : ''}
  </div>`;
}

function itKpiHtml(issues) {
  if (!issues || issues.length === 0) return '';
  const byPart = {}, byCust = {};
  issues.forEach(iss => {
    const pk = iss.partNo || '(품번 없음)';
    if (!byPart[pk]) byPart[pk] = { partName: iss.partName || '', count: 0, qty: 0, 접수: 0, 처리중: 0, 완료: 0 };
    byPart[pk].count++;
    byPart[pk].qty += Number(iss.qty) || 0;
    byPart[pk][iss.status] = (byPart[pk][iss.status] || 0) + 1;
    const ck = iss.customer || '(고객사 없음)';
    if (!byCust[ck]) byCust[ck] = { count: 0, qty: 0, 접수: 0, 처리중: 0, 완료: 0 };
    byCust[ck].count++;
    byCust[ck].qty += Number(iss.qty) || 0;
    byCust[ck][iss.status] = (byCust[ck][iss.status] || 0) + 1;
  });
  const sdot = (s, n) => n ? `<span style="background:${s==='접수'?'rgba(239,68,68,.18)':s==='처리중'?'rgba(245,158,11,.18)':'rgba(34,197,94,.18)'};color:${s==='접수'?'#f87171':s==='처리중'?'#fbbf24':'#4ade80'};padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700">${s} ${n}</span>` : '';
  const mkCard = (icon, lbl, name, v, color) => `
    <div class="kpi" style="--kc:${color};padding:14px 16px">
      <div style="font-size:.7rem;color:var(--text-muted);font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px">${icon} ${lbl}</div>
      <div style="font-size:.9rem;font-weight:800;color:var(--accent-cyan);font-family:monospace;margin-bottom:${v.partName?'1px':'8px'}">${esc(name)}</div>
      ${v.partName ? `<div style="font-size:.76rem;color:var(--text-dim);margin-bottom:8px">${esc(v.partName)}</div>` : ''}
      <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:6px">
        <span style="font-size:1.7rem;font-weight:800;color:${color};line-height:1">${v.count}</span>
        <span style="font-size:.8rem;color:var(--text-muted)">건 · ${v.qty.toLocaleString()}개</span>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">${[sdot('접수',v['접수']),sdot('처리중',v['처리중']),sdot('완료',v['완료'])].filter(Boolean).join('')}</div>
    </div>`;
  const partCards = Object.entries(byPart).sort((a,b)=>b[1].count-a[1].count)
    .map(([k,v]) => mkCard('🔩','품번', k, v, (v['접수']||0)+(v['처리중']||0)>0?'#ef4444':'#22c55e')).join('');
  const custCards = Object.entries(byCust).sort((a,b)=>b[1].count-a[1].count)
    .map(([k,v]) => mkCard('🏭','고객사', k, v, (v['접수']||0)+(v['처리중']||0)>0?'#f59e0b':'#22c55e')).join('');
  return `
  <div class="card" style="margin-top:14px">
    <div class="card-hdr"><span class="card-title">📊 품번 · 고객사별 KPI</span><span class="cb">${issues.length}건 기준</span></div>
    <div style="padding:8px 0 14px">
      <div style="font-size:.74rem;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">품번별 현황</div>
      <div class="g4 sp">${partCards}</div>
    </div>
    <div style="border-top:1px solid var(--border);padding:14px 0 4px">
      <div style="font-size:.74rem;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">고객사별 현황</div>
      <div class="g4 sp">${custCards}</div>
    </div>
  </div>`;
}

function itLookupPart(val) {
  if (!val) return;
  const nameEl = document.getElementById('it-partname');
  if (!nameEl || !DB.parts || !DB.parts.length) return;
  // datalist 선택 시 "품번 — 품명" 형식 처리
  const dashIdx = val.indexOf(' — ');
  const searchNo = dashIdx >= 0 ? val.slice(0, dashIdx).trim() : val.trim();
  const found = DB.parts.find(p => p.partNo && p.partNo.toLowerCase() === searchNo.toLowerCase());
  if (found) {
    nameEl.value = found.partName || '';
    if (dashIdx >= 0) document.getElementById('it-partno').value = found.partNo;
  }
}

function itAddPhotos(input) {
  const files = Array.from(input.files);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      _itPhotos.push(e.target.result);
      loaded++;
      if (loaded === files.length) renderItPreviews();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderItPreviews() {
  const el = document.getElementById('it-photo-preview');
  if (!el) return;
  el.innerHTML = _itPhotos.map((src, i) =>
    `<div class="it-thumb">
      <img src="${src}" alt="미리보기">
      <button class="xt" onclick="itRemovePhoto(${i})" title="삭제">✕</button>
    </div>`).join('');
}

function itRemovePhoto(idx) {
  _itPhotos.splice(idx, 1);
  renderItPreviews();
}

function itClearForm() {
  ['it-partno','it-partname','it-customer','it-occdate','it-datecode','it-qty','it-problem'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  const st = document.getElementById('it-status');
  if (st) st.value = '접수';
  _itPhotos = [];
  renderItPreviews();
}

function itSubmit() {
  const partNoRaw = (document.getElementById('it-partno')?.value||'').trim();
  const dashIdx   = partNoRaw.indexOf(' — ');
  const partNo    = dashIdx >= 0 ? partNoRaw.slice(0, dashIdx).trim() : partNoRaw;
  const partName  = dashIdx >= 0
    ? (document.getElementById('it-partname')?.value||'').trim() || partNoRaw.slice(dashIdx+3).trim()
    : (document.getElementById('it-partname')?.value||'').trim();
  const customer  = (document.getElementById('it-customer')?.value||'').trim();
  const dateCode  = (document.getElementById('it-datecode')?.value||'').trim();
  const occDate   = (document.getElementById('it-occdate')?.value||'').trim();
  const qty       = (document.getElementById('it-qty')?.value||'').trim();
  const problem   = (document.getElementById('it-problem')?.value||'').trim();
  const status    = document.getElementById('it-status')?.value || '접수';

  if (!partNo && !problem) { alert('불량품번 또는 문제 내용을 입력하세요.'); return; }

  if (!DB.issueTracker) DB.issueTracker = [];
  const now = new Date();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  DB.issueTracker.push({ id: Date.now(), partNo, partName, customer, occDate, dateCode, qty, problem, status, photos: [..._itPhotos], createdAt: fmt(now) });
  _itPhotos = [];
  saveData();
  renderIssueTracker();
}

function itDelete(id) {
  checkAdminPwd(() => {
    if (!confirm('이슈를 삭제하시겠습니까?')) return;
    DB.issueTracker = (DB.issueTracker||[]).filter(x => x.id !== id);
    saveData();
    renderIssueTracker();
  });
}

function itCycleStatus(id) {
  const issue = (DB.issueTracker||[]).find(x => x.id === id);
  if (!issue) return;
  const list = ['접수','처리중','완료'];
  issue.status = list[(list.indexOf(issue.status)+1) % list.length];
  saveData();
  renderIssueTracker();
}

function itViewPhoto(issueId, photoIdx) {
  const issue = (DB.issueTracker||[]).find(x => x.id === issueId);
  if (!issue || !issue.photos || !issue.photos[photoIdx]) return;
  const w = window.open('', '_blank', 'width=900,height=700');
  if (!w) return;
  w.document.write(`<!DOCTYPE html><html><head><title>이슈 사진</title></head><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;cursor:zoom-out" onclick="window.close()"><img src="${issue.photos[photoIdx]}" style="max-width:98vw;max-height:98vh;object-fit:contain"></body></html>`);
}

let _cdYear = new Date().getFullYear();
let _cdCustomer = '';

function setCdFilter(type, val) {
  if (type === 'year') _cdYear = parseInt(val) || new Date().getFullYear();
  else if (type === 'customer') _cdCustomer = val;
  renderCustomerDefect();
  setTimeout(initCustDefectChart, 50);
}

function renderCustomerDefect() {
  const el = document.getElementById('tab-customer-defect');
  if (!el) return;
  const all = DB.customerDefects || [];

  // 년도 목록 (데이터가 없어도 현재 연도 포함)
  const yearSet = new Set(all.map(r => r.year));
  yearSet.add(new Date().getFullYear());
  const years = [...yearSet].sort((a, b) => b - a);

  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // 선택 연도의 전체 고객사 목록
  const custSet = new Set(all.map(r => r.customer).filter(Boolean));
  const customers = [...custSet].sort();

  // 월별 집계 (선택 연도 전체)
  const summary = {};
  all.filter(r => r.year === _cdYear).forEach(r => {
    if (!summary[r.customer]) summary[r.customer] = {};
    summary[r.customer][r.month] = (summary[r.customer][r.month] || 0) + (r.qty || 1);
  });
  const monthTotals = Array.from({length: 12}, (_, i) =>
    Object.values(summary).reduce((s, m) => s + (m[i + 1] || 0), 0));

  // 필터된 상세 목록
  const listData = all
    .filter(r => r.year === _cdYear && (!_cdCustomer || r.customer === _cdCustomer))
    .sort((a, b) => b.date.localeCompare(a.date));

  // 연도 select
  const yearOpts = years.map(y =>
    `<option value="${y}"${y === _cdYear ? ' selected' : ''}>${y}년</option>`).join('');

  // 월별 요약 행
  const summaryRows = Object.entries(summary).map(([cust, mdata]) => {
    const tot = Object.values(mdata).reduce((s, v) => s + v, 0);
    const cells = Array.from({length: 12}, (_, i) => {
      const v = mdata[i + 1] || 0;
      return `<td style="text-align:center${v > 0 ? ';color:#f87171;font-weight:700' : ''}">${v > 0 ? v : '-'}</td>`;
    }).join('');
    return `<tr><td style="font-weight:600;white-space:nowrap">${esc(cust)}</td>${cells}<td style="text-align:center;font-weight:800;color:var(--accent-cyan)">${tot}</td></tr>`;
  }).join('') || `<tr><td colspan="14" style="text-align:center;padding:24px;color:var(--text-muted)">${_cdYear}년 데이터 없음</td></tr>`;

  const totalRow = `<tr style="background:rgba(37,99,235,.07)">
    <td style="font-weight:700;color:var(--text-dim)">합계</td>
    ${monthTotals.map(v => `<td style="text-align:center;font-weight:700;color:${v > 0 ? 'var(--accent-gold)' : 'var(--text-dim)'}">${v > 0 ? v : '-'}</td>`).join('')}
    <td style="text-align:center;font-weight:800;color:var(--accent-cyan)">${monthTotals.reduce((s, v) => s + v, 0)}</td>
  </tr>`;

  // 고객사 필터 select (상세목록용)
  const custFilterOpts = `<option value="">전체 고객사</option>` +
    customers.map(c => `<option value="${esc(c)}"${c === _cdCustomer ? ' selected' : ''}>${esc(c)}</option>`).join('');

  // 상세 레코드 행
  const detailRows = listData.map(r => `<tr>
    <td style="white-space:nowrap">${esc(r.customer || '')}</td>
    <td style="white-space:nowrap">${r.month}월 ${r.date ? r.date.slice(5).replace('-', '/') : ''}</td>
    <td>${esc(r.defectType || '')}</td>
    <td style="text-align:center">${r.qty || 1}</td>
    <td style="color:var(--text-muted)">${esc(r.note || '')}</td>
    <td class="act-cell">
      <button class="btn-edit" onclick="editCustDefect(${r.id})" title="수정">✎</button>
      <button class="btn-del" onclick="delCustDefect(${r.id})" title="삭제">✕</button>
    </td>
  </tr>`).join('') || `<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted)">등록된 불량이 없습니다</td></tr>`;

  // KPI 집계
  const thisMonthNum = new Date().getMonth() + 1;
  const thisYearTotal = all.filter(r => r.year === _cdYear).reduce((s, r) => s + (r.qty || 1), 0);
  const thisMonthTotal = all.filter(r => r.year === _cdYear && r.month === thisMonthNum).reduce((s, r) => s + (r.qty || 1), 0);
  const custCount = Object.keys(summary).length;
  const topEntry = Object.entries(summary).map(([c, m]) => [c, Object.values(m).reduce((s,v)=>s+v,0)]).sort((a,b)=>b[1]-a[1])[0];

  el.innerHTML = `
  <div class="page-hdr">
    <h2>📊 고객 불량 현황</h2>
    <div class="hdr-actions">
      <select onchange="setCdFilter('year',this.value)" style="height:32px;padding:0 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:.8rem;font-weight:600;cursor:pointer;outline:none">${yearOpts}</select>
      <button class="btn-add" onclick="addCustDefect()">＋ 불량 등록</button>
    </div>
  </div>

  <div class="g4 sp">
    <div class="kpi" style="--kc:#ef4444">
      <div class="kpi-lbl">연간 누적 불량</div>
      <div class="kpi-val">${thisYearTotal}건</div>
      <div class="kpi-sub">${_cdYear}년 전체</div>
    </div>
    <div class="kpi" style="--kc:#f59e0b">
      <div class="kpi-lbl">이번달 불량</div>
      <div class="kpi-val">${thisMonthTotal}건</div>
      <div class="kpi-sub">${thisMonthNum}월 기준</div>
    </div>
    <div class="kpi" style="--kc:#2563eb">
      <div class="kpi-lbl">관리 고객사</div>
      <div class="kpi-val">${custCount}개사</div>
      <div class="kpi-sub">불량 이력 고객사</div>
    </div>
    <div class="kpi" style="--kc:#a855f7">
      <div class="kpi-lbl">최다 불량 고객사</div>
      <div class="kpi-val" style="font-size:1.2rem">${topEntry ? esc(topEntry[0]) : '-'}</div>
      <div class="kpi-sub">${topEntry ? topEntry[1]+'건' : '데이터 없음'}</div>
    </div>
  </div>

  <div class="card sp">
    <div class="card-hdr">
      <span class="card-title">📅 ${_cdYear}년 고객사별 월별 불량 현황</span>
    </div>
    <div style="overflow-x:auto">
      <table class="tbl" style="min-width:860px;font-size:.8rem">
        <thead><tr>
          <th style="min-width:110px">고객사</th>
          ${MONTHS.map(m => `<th style="text-align:center;min-width:46px">${m}</th>`).join('')}
          <th style="text-align:center;min-width:52px">합계</th>
        </tr></thead>
        <tbody>${summaryRows}${totalRow}</tbody>
      </table>
    </div>
  </div>

  <div class="card sp">
    <div class="card-hdr"><span class="card-title">📈 고객사별 월별 불량 추이 (${_cdYear}년)</span></div>
    <div class="chart-wrap" style="height:280px"><canvas id="chartCustDefect"></canvas></div>
  </div>

  <div class="card">
    <div class="card-hdr">
      <span class="card-title">📋 불량 상세 목록</span>
      <select onchange="setCdFilter('customer',this.value)" style="height:28px;padding:0 9px;border-radius:7px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:.78rem;font-weight:600;cursor:pointer;outline:none">${custFilterOpts}</select>
    </div>
    <div style="overflow-x:auto">
      <table class="tbl tbl-nowrap" style="font-size:.82rem">
        <thead><tr>
          <th>고객사</th><th>발생일</th><th>불량 유형</th>
          <th style="text-align:center">수량</th><th>비고</th><th style="width:70px">액션</th>
        </tr></thead>
        <tbody>${detailRows}</tbody>
      </table>
    </div>
  </div>`;

  setTimeout(initCustDefectChart, 40);
}

function addCustDefect() {
  const today = new Date();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  openModal('고객 불량 등록', SCHEMA.custDefect, {date: fmt(today), qty: 1}, res => {
    if (!DB.customerDefects) DB.customerDefects = [];
    const d = new Date(res.date);
    res.id = Date.now();
    res.year = isNaN(d) ? _cdYear : d.getFullYear();
    res.month = isNaN(d) ? (new Date().getMonth() + 1) : (d.getMonth() + 1);
    res.qty = parseInt(res.qty) || 1;
    DB.customerDefects.push(res);
    _cdYear = res.year;
    saveData();
    renderCustomerDefect();
    setTimeout(initCustDefectChart, 50);
  });
}

function editCustDefect(id) {
  const rec = (DB.customerDefects || []).find(r => r.id === id);
  if (!rec) return;
  openModal('고객 불량 수정', SCHEMA.custDefect, rec, res => {
    const d = new Date(res.date);
    res.year = isNaN(d) ? rec.year : d.getFullYear();
    res.month = isNaN(d) ? rec.month : (d.getMonth() + 1);
    res.qty = parseInt(res.qty) || 1;
    Object.assign(rec, res);
    saveData();
    renderCustomerDefect();
    setTimeout(initCustDefectChart, 50);
  });
}

function delCustDefect(id) {
  checkAdminPwd(() => {
    if (!confirm('삭제하시겠습니까?')) return;
    DB.customerDefects = (DB.customerDefects || []).filter(r => r.id !== id);
    saveData();
    renderCustomerDefect();
    setTimeout(initCustDefectChart, 50);
  });
}

function initCustDefectChart() {
  const canvas = document.getElementById('chartCustDefect');
  if (!canvas) return;
  const existing = Chart.getChart('chartCustDefect');
  if (existing) existing.destroy();

  const isLight = document.body.classList.contains('light');
  const gridColor = isLight ? '#e2e8f0' : '#1e2d4a';
  const textColor = isLight ? '#475569' : '#94a3b8';

  const all = DB.customerDefects || [];
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const PALETTE = ['#ef4444','#f59e0b','#22c55e','#2563eb','#a855f7','#06b6d4','#f97316','#84cc16'];

  const yearData = all.filter(r => r.year === _cdYear);
  const customers = [...new Set(yearData.map(r => r.customer).filter(Boolean))].sort();

  if (!customers.length) {
    new Chart(canvas, {
      type: 'bar',
      data: { labels: MONTHS, datasets: [{label: '데이터 없음', data: Array(12).fill(0), backgroundColor: 'rgba(100,116,139,.3)', borderRadius: 4}] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: {display: false} },
        scales: { x: {grid:{display:false}, ticks:{color:textColor}}, y: {grid:{color:gridColor}, beginAtZero:true, ticks:{color:textColor,stepSize:1}} }
      }
    });
    return;
  }

  const summary = {};
  yearData.forEach(r => {
    if (!summary[r.customer]) summary[r.customer] = {};
    summary[r.customer][r.month] = (summary[r.customer][r.month] || 0) + (r.qty || 1);
  });

  const datasets = customers.map((cust, i) => ({
    label: cust,
    data: Array.from({length: 12}, (_, m) => summary[cust]?.[m + 1] || 0),
    backgroundColor: PALETTE[i % PALETTE.length] + 'bb',
    borderColor: PALETTE[i % PALETTE.length],
    borderWidth: 1.5,
    borderRadius: 4,
  }));

  new Chart(canvas, {
    type: 'bar',
    data: { labels: MONTHS, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: {boxWidth: 10, padding: 12, color: textColor} },
        tooltip: { callbacks: { label: ctx => `  ${ctx.dataset.label}: ${ctx.raw}건` } }
      },
      scales: {
        x: { grid: {display: false}, ticks: {color: textColor} },
        y: { grid: {color: gridColor}, beginAtZero: true, ticks: {color: textColor, stepSize: 1, precision: 0},
             title: {display: true, text: '불량 건수', color: textColor, font: {size: 10}} }
      }
    }
  });
}

// PARTS EXCEL IMPORT
// ═══════════════════════════════════════════════
function handlePartsExcelUpload(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  processPartsFile(file);
}
function handlePartsExcelDrop(event) {
  const file = event.dataTransfer.files[0];
  if (!file) return;
  processPartsFile(file);
}
function processPartsFile(file) {
  if (typeof XLSX === 'undefined') { alert('라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if (!raw || raw.length < 2) { alert('데이터가 없습니다. 헤더 + 데이터 행이 있는 파일을 사용하세요.'); return; }

      // 헤더 행 자동 탐지: 첫 15행 중 품번/품명 키워드가 있는 행 찾기
      const HDR_KEYWORDS = ['품번','품명','partno','partname','part_no','part_name','부품번호','부품명','자재번호','자재명','코드','품목'];
      let hdrRowIdx = 0;
      for (let i = 0; i < Math.min(raw.length, 15); i++) {
        const rowLower = raw[i].map(c => String(c||'').toLowerCase().replace(/[\s_\-\(\)]/g,''));
        if (HDR_KEYWORDS.some(k => rowLower.some(c => c.includes(k)))) { hdrRowIdx = i; break; }
      }
      const headers = raw[hdrRowIdx].map((h,i) => h ? String(h).trim() : `열${i+1}`);
      const dataRows = raw.slice(hdrRowIdx + 1).filter(r => r.some(c => c !== ''));
      const cm = detectPartsColumns(headers);
      // 열 매핑이 안 됐을 경우 경고
      if (!cm.partNo && !cm.partName) {
        alert(`품번 또는 품명 열을 찾지 못했습니다.\n검출된 열(${hdrRowIdx+1}행 기준): ${headers.join(', ')}\n\n헤더 행에 "품번", "품명" 같은 열 이름이 있는지 확인해주세요.`);
        return;
      }
      // 파싱
      const parsed = dataRows.map(r => {
        const get = col => col ? String(r[headers.indexOf(col)]||'').trim() : '';
        return {
          partNo:   get(cm.partNo),
          partName: get(cm.partName),
          maker:    get(cm.maker),
          model:    get(cm.model),
          unit:     get(cm.unit) || 'EA',
          note:     get(cm.note),
        };
      }).filter(p => p.partNo || p.partName);
      if (!parsed.length) { alert('유효한 데이터 행이 없습니다.'); return; }
      // 중복 체크 및 병합
      if (!DB.parts) DB.parts = [];
      let added = 0, updated = 0;
      parsed.forEach(p => {
        const existing = DB.parts.find(x => x.partNo && x.partNo === p.partNo);
        if (existing) {
          Object.assign(existing, p);
          updated++;
        } else {
          p.id = ++nextId;
          DB.parts.push(p);
          added++;
        }
      });
      saveData();
      refresh();
      alert(`✅ 엑셀 등록 완료\n\n신규 추가: ${added}개\n업데이트: ${updated}개\n총 등록: ${DB.parts.length}개`);
    } catch(err) {
      alert('파일 처리 중 오류가 발생했습니다:\n' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}
function detectPartsColumns(headers) {
  const lw = headers.map(h => h.toLowerCase().replace(/[\s_\-\(\)]/g,''));
  const find = (...pats) => {
    for (const p of pats) {
      const idx = lw.findIndex(h => h.includes(p));
      if (idx >= 0) return headers[idx];
    }
    return '';
  };
  return {
    partNo:   find('품번','partno','part_no','부품번호','자재번호','코드','code','번호'),
    partName: find('품명','partname','part_name','부품명','자재명','명칭','품목','name'),
    maker:    find('고객사','maker','customer','거래처','납품처','제조사','client'),
    model:    find('차종','model','모델','모델명','차량','vehicle'),
    unit:     find('단위','unit','uom'),
    note:     find('비고','note','remark','메모','memo','특이사항'),
  };
}

let VENDORS      = [];

function loadMasters() {
  try { VENDORS      = JSON.parse(localStorage.getItem('qm_vendor_master')   || '[]'); } catch(e) { VENDORS = []; }
  try { CUSTOMERS    = JSON.parse(localStorage.getItem('qm_customer_master') || '[]'); } catch(e) { CUSTOMERS = []; }
  try { PRICE_MASTER = JSON.parse(localStorage.getItem('qm_price_master')    || '[]'); } catch(e) { PRICE_MASTER = []; }
}

function saveMasters() {
  localStorage.setItem('qm_vendor_master',   JSON.stringify(VENDORS));
  localStorage.setItem('qm_customer_master', JSON.stringify(CUSTOMERS));
  localStorage.setItem('qm_price_master',    JSON.stringify(PRICE_MASTER));
  localStorage.setItem('qm_masters_updatedAt', String(Date.now()));
  pushMastersToFirestore();
  updateMasterDatalises();
}

function updateMasterDatalises() {
  const vl = document.getElementById('vendorsList');
  if (vl) vl.innerHTML = VENDORS.map(v => `<option value="${esc(v.name)}">`).join('');
  const cl = document.getElementById('customersList');

async function pushMastersToFirestore() {
  if (!_fdb) return;
  try {
    const ts = Date.now();
    await _fdb.collection('qm').doc('masters').set({
      vendors:      JSON.stringify(VENDORS),
      customers:    JSON.stringify(CUSTOMERS),
      priceMaster:  JSON.stringify(PRICE_MASTER),
      updatedAt: ts
    });
  } catch(e) { console.warn('마스터 Firestore 저장 실패:', e); }
}

async function pullMastersFromFirestore() {
  if (!_fdb) return;
  try {
    const snap = await _fdb.collection('qm').doc('masters').get();
    if (!snap.exists) return;
    const d = snap.data();
    const localTs  = parseInt(localStorage.getItem('qm_masters_updatedAt') || '0', 10);
    const remoteTs = d.updatedAt || 0;
    if (remoteTs <= localTs) return; // 로컬이 최신이거나 동일 → 무시
    if (d.vendors)     { try { VENDORS      = JSON.parse(d.vendors);     } catch(e){} }
    if (d.customers)   { try { CUSTOMERS    = JSON.parse(d.customers);   } catch(e){} }
    if (d.priceMaster) { try { PRICE_MASTER = JSON.parse(d.priceMaster); } catch(e){} }
    localStorage.setItem('qm_vendor_master',   JSON.stringify(VENDORS));
    localStorage.setItem('qm_customer_master', JSON.stringify(CUSTOMERS));
    localStorage.setItem('qm_price_master',    JSON.stringify(PRICE_MASTER));
    localStorage.setItem('qm_masters_updatedAt', String(remoteTs));
    updateMasterDatalises();
    renderParts();
  } catch(e) { console.warn('마스터 Firestore 로드 실패:', e); }
}

// ── 단가 엑셀 업로드 ──
function handlePriceExcelUpload(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (file) processPriceFile(file);
}
function handlePriceExcelDrop(event) {
  const file = event.dataTransfer.files[0];
  if (file) processPriceFile(file);
}
function processPriceFile(file) {
  if (typeof XLSX === 'undefined') { alert('라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if (!raw || raw.length < 2) { alert('데이터가 없습니다.'); return; }

      // 헤더 탐지
      const HDR_KW = ['품번','품명','partno','partname','재작업','폐기','단가','scrap','rework'];
      let hdrIdx = 0;
      for (let i = 0; i < Math.min(raw.length, 15); i++) {
        const rowLow = raw[i].map(c => String(c||'').toLowerCase().replace(/[\s_\-\(\)]/g,''));
        if (HDR_KW.some(k => rowLow.some(c => c.includes(k)))) { hdrIdx = i; break; }
      }
      const headers = raw[hdrIdx].map((h,i) => h ? String(h).trim() : `열${i+1}`);
      const dataRows = raw.slice(hdrIdx + 1).filter(r => r.some(c => c !== ''));

      // 열 매핑
      const lw = headers.map(h => h.toLowerCase().replace(/[\s_\-\(\)]/g,''));
      const findCol = (...pats) => {
        for (const p of pats) { const i = lw.findIndex(h => h.includes(p)); if (i >= 0) return headers[i]; }
        return '';
      };
      const cm = {
        partNo:        findCol('품번','partno','자재번호','코드','번호'),
        partName:      findCol('품명','partname','품목','자재명','명칭'),
        costUnit: findCol('단가','unitcost','unit_cost','단가금액','개당단가','price'),
        note:          findCol('비고','note','remark','메모'),
      };

      let added = 0, updated = 0;
      dataRows.forEach(row => {
        const byHdr = k => row[headers.indexOf(k)];
        const partNo   = String(byHdr(cm.partNo)   || '').trim();
        const partName = String(byHdr(cm.partName)  || '').trim();
        if (!partNo && !partName) return;

        const parseCost = v => {
          if (!v && v !== 0) return 0;
          const n = parseFloat(String(v).replace(/[,\s₩원]/g,''));
          return isNaN(n) ? 0 : n;
        };

        const entry = {
          partNo, partName,
          costUnit: parseCost(byHdr(cm.costUnit)),
          note: String(byHdr(cm.note) || '').trim(),
        };

        // 동일 품번이면 업데이트
        const existing = PRICE_MASTER.find(p =>
          (partNo && p.partNo === partNo) || (!partNo && partName && p.partName === partName)
        );
        if (existing) { Object.assign(existing, entry); updated++; }
        else { entry.id = ++nextId; PRICE_MASTER.push(entry); added++; }
      });

      saveMasters(); renderParts();
      alert(`단가 마스터 업로드 완료\n신규: ${added}건 / 업데이트: ${updated}건`);
    } catch(err) {
      console.error(err);
      alert('파일 처리 중 오류가 발생했습니다.');
    }
  };
  reader.readAsArrayBuffer(file);
}

function initCollapsible() {
  const KEY = 'qm_collapse_v1';
  let st = {};
  try { st = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) {}
  document.querySelectorAll('.card').forEach(card => {
    const hdr = card.querySelector(':scope > .card-hdr');
    if (!hdr || hdr.querySelector('.collapse-btn')) return;
    const titleEl = hdr.querySelector('.card-title');
    const tabEl   = card.closest('[id^="tab-"]');
    const tabId   = tabEl ? tabEl.id : 'root';
    const raw     = titleEl ? titleEl.textContent.trim().slice(0, 30) : ('c' + Math.random().toString(36).slice(2));
    const cardKey = tabId + '__' + raw.replace(/\s+/g,'_').replace(/[^\w가-힣]/g,'');
    card.dataset.collapseKey = cardKey;
    if (st[cardKey]) card.classList.add('collapsed');
    const btn = document.createElement('button');
    btn.className = 'collapse-btn';
    btn.title = '접기/펴기';
    btn.textContent = card.classList.contains('collapsed') ? '▼ 펼치기' : '▲ 접기';
    btn.onclick = e => {
      e.stopPropagation();
      const expanding = card.classList.contains('collapsed');
      card.classList.toggle('collapsed');
      btn.textContent = card.classList.contains('collapsed') ? '▼ 펼치기' : '▲ 접기';
      if (expanding) {
        card.querySelectorAll('canvas').forEach(cv => {
          const ch = Chart.getChart(cv); if (ch) setTimeout(() => ch.resize(), 50);
        });
      }
      try {
        const s = JSON.parse(localStorage.getItem(KEY) || '{}');
        if (card.classList.contains('collapsed')) s[cardKey] = 1; else delete s[cardKey];
        localStorage.setItem(KEY, JSON.stringify(s));
      } catch(e) {}
    };
    hdr.appendChild(btn);
  });
}

(function init() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

  const now = new Date();
  const wk = getWeekNum(now);
  document.getElementById('weekBadge').textContent = DB.meeting.week || `${now.getFullYear()}년 ${wk}주차`;

  // 마스터 데이터 로드 (업체·고객사)

  updateMasterDatalises();

  // 현재 DB를 세션으로 등록 (localStorage에 실제 저장된 데이터가 있을 때만 push)
  // 새 PC에서 localStorage가 비어있으면 DEFAULTS를 Firestore에 덮어쓰지 않도록 방지
  _currentSessionId = getWeekId(DB);
  loadPersistent();
  if (localStorage.getItem('qm_data')) {
    persistCurrentSession();
  } else {
    // 로컬 데이터 없음 — Firestore pull 후 자동으로 세션 등록됨
    _currentSessionId = null; // 새 PC: null이면 주차 불문 무조건 pull
    renderFilterBar();
  }

  applyFontSize();
  setTheme(currentTheme);
  renderAll();
  setTimeout(initCharts, 100);
  setTimeout(initCollapsible, 120);

  // Firestore에서 최신 데이터 로드 → 완료 후 파일 리스너 등록 + 초기 pull
  pullFromFirestore().then(() => {
    const _wid = _currentSessionId || getWeekId(DB);
    subscribeFileListeners(_wid); // 실시간 리스너 등록 (이후 변경은 즉시 반영)
    if (!vqData || !fcData || !sortData || !holdData) {
      pullCurrentSessionFilesFromFirestore(_wid);
    }
  });

  // Firestore 세션 목록 동기화
  pullSessionListFromFirestore();

  // 마스터 데이터 Firestore 동기화
  pullMastersFromFirestore();

  // 영구 보관 데이터 Firestore 동기화
  pullPersistentFromFirestore();

  // 120초 자동 폴링 (세션·마스터·영구 데이터)
  setInterval(() => {
    pullFromFirestore();
    pullSessionListFromFirestore();
    pullPersistentFromFirestore();
    pullMastersFromFirestore();
  }, 120000);

  // 60초 파일 백업 폴링: onSnapshot 리스너 누락 대비 안전망
  setInterval(() => {
    const wid = _currentSessionId;
    if (wid) {
      subscribeFileListeners(wid); // 리스너가 끊겼으면 재등록
      pullCurrentSessionFilesFromFirestore(wid);
    }
  }, 60000);

  // 필터바 초기화
  renderFilterBar();

  // ESC closes modal
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // 제목 폰트 크기 초기화
  const h1El = document.querySelector('.h-titles h1');
  const savedH1Size = parseFloat(localStorage.getItem('h1FontSize'));
  if (savedH1Size) h1El.style.fontSize = savedH1Size + 'rem';
})();

function adjustH1Font(delta) {
  const h1 = document.querySelector('.h-titles h1');
  const current = parseFloat(h1.style.fontSize) || parseFloat(getComputedStyle(h1).fontSize) / 16;
  const next = Math.min(3, Math.max(0.6, Math.round((current + delta) * 10) / 10));
  h1.style.fontSize = next + 'rem';
  localStorage.setItem('h1FontSize', next);
}
</script>
</body>
</html>
