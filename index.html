<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a2744">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="/manifest.json">
<title>품질 주간 회의</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0a0e1a;--bg-card:#111827;--bg-nav:#0d1422;
  --border:#1e2d4a;--border2:rgba(30,45,74,.5);
  --text-primary:#f1f5f9;--text-muted:#94a3b8;--text-dim:#64748b;
  --accent-blue:#2563eb;--accent-cyan:#06b6d4;--accent-gold:#f59e0b;
  --accent-red:#ef4444;--accent-green:#22c55e;--accent-purple:#a855f7;
  --shadow:0 8px 32px rgba(0,0,0,.4);
  --nav-h:64px;--filter-h:44px;--tab-h:52px;
}
body.light{
  --bg-primary:#f0f4f8;--bg-card:#ffffff;--bg-nav:#e8edf5;
  --border:#dde3ed;--border2:rgba(200,210,230,.6);
  --text-primary:#0f172a;--text-muted:#475569;--text-dim:#94a3b8;
  --shadow:0 8px 32px rgba(0,0,0,.1);
}
html{font-size:14px}
body{background:var(--bg-primary);color:var(--text-primary);font-family:'Segoe UI',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);
  background:linear-gradient(135deg,#0d1b3e,#162040);
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  box-shadow:0 4px 24px rgba(0,0,0,.5)}
.h-left{display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent-blue),var(--accent-cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;color:#fff;box-shadow:0 0 16px rgba(37,99,235,.5)}
.h-titles h1{font-size:1.1rem;font-weight:700;color:#f1f5f9;transition:font-size .2s}
.font-btn{width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);color:#fff;font-size:.75rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1}
.font-btn:hover{background:rgba(255,255,255,.22)}
.h-titles p{font-size:.7rem;color:var(--accent-cyan);letter-spacing:1px}
.h-right{display:flex;align-items:center;gap:8px}
.week-badge{background:rgba(37,99,235,.2);border:1px solid rgba(37,99,235,.4);
  border-radius:20px;padding:4px 14px;font-size:.78rem;color:var(--accent-cyan);font-weight:600}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);color:#fff;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:hover{background:rgba(255,255,255,.18)}

/* FILTER BAR */
.filter-bar{position:fixed;top:var(--nav-h);left:0;right:0;z-index:98;height:var(--filter-h);
  background:var(--bg-nav);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:6px;transition:background .3s}
.filter-bar select{height:28px;padding:0 8px;border-radius:7px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text-primary);font-size:.78rem;font-weight:600;
  cursor:pointer;outline:none;transition:border-color .2s}
.filter-bar select:hover{border-color:rgba(37,99,235,.5)}
.filter-bar select:focus{border-color:var(--accent-blue)}
body.light .filter-bar select{background:#fff}
.filter-nav-btn{height:28px;width:28px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.filter-nav-btn:hover{background:rgba(37,99,235,.12);color:var(--text-primary);border-color:rgba(37,99,235,.4)}
.filter-nav-btn:disabled{opacity:.35;cursor:default}
.filter-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.filter-lbl{font-size:.72rem;color:var(--text-dim);margin-right:4px;white-space:nowrap}
.filter-session-count{font-size:.7rem;color:var(--text-dim);padding:3px 10px;border-radius:6px;
  background:rgba(37,99,235,.07);border:1px solid rgba(37,99,235,.15);white-space:nowrap}
.filter-cur-badge{font-size:.72rem;color:var(--accent-cyan);font-weight:700;padding:3px 10px;
  border-radius:6px;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);white-space:nowrap}

/* NAV TABS */
.nav-tabs{position:fixed;top:calc(var(--nav-h) + var(--filter-h));left:0;right:0;z-index:99;height:var(--tab-h);
  background:var(--bg-nav);border-bottom:1px solid var(--border);
  display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;padding:0 8px;gap:4px;
  transition:background .3s}
.nav-tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;height:36px;padding:0 16px;border:1px solid transparent;border-radius:8px;
  background:transparent;color:var(--text-muted);font-size:.8rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:var(--text-primary);background:rgba(128,128,128,.08)}
.tab-btn.active{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.4);color:var(--accent-cyan)}
.tab-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.7}
.font-ctrl{display:flex;align-items:center;gap:4px;margin-left:auto;padding-right:6px;flex-shrink:0}
.font-btn{height:28px;min-width:28px;padding:0 7px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;font-weight:700;transition:all .2s;white-space:nowrap}
.font-btn:hover{background:rgba(128,128,128,.1);color:var(--text-primary)}
.font-btn.active-size{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.4);color:var(--accent-cyan)}
.font-size-input{height:28px;width:58px;padding:0 6px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);text-align:center;font-size:.72rem;font-weight:700;outline:none}
.font-size-input:focus{border-color:rgba(37,99,235,.45);color:var(--text-primary)}
.font-size-input::-webkit-outer-spin-button,.font-size-input::-webkit-inner-spin-button{-webkit-appearance:none;appearance:none;margin:0}
.font-size-input[type=number]{-moz-appearance:textfield;appearance:textfield}

/* MAIN */
main{margin-top:calc(var(--nav-h) + var(--filter-h) + var(--tab-h));padding:20px;max-width:1400px;margin-left:auto;margin-right:auto}
.section{display:none}
.section.active{display:block}

/* PAGE HEADER */
.page-hdr{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.page-hdr h2{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:8px}
.page-hdr h2::before{content:'';display:inline-block;width:4px;height:22px;border-radius:2px;
  background:linear-gradient(var(--accent-blue),var(--accent-cyan))}
.hdr-actions{display:flex;gap:8px;align-items:center}

/* GRID */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g5{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.g2,.g3,.g4,.g5{grid-template-columns:1fr}main{padding:14px}}

/* KPI CARD */
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px;
  position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--accent-blue))}
.kpi-icon{font-size:1.8rem;margin-bottom:8px}
.kpi-lbl{font-size:.73rem;color:var(--text-muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-size:2rem;font-weight:800;line-height:1;margin-bottom:6px;color:var(--kc,var(--accent-blue))}
.kpi-sub{font-size:.73rem;color:var(--text-muted)}
.kpi-trend{position:absolute;top:14px;right:14px;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px}
.kpi-edit-btn{position:absolute;bottom:12px;right:12px;width:22px;height:22px;border-radius:5px;
  background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text-dim);
  font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.kpi-edit-btn:hover{background:rgba(37,99,235,.2);color:var(--accent-cyan);border-color:rgba(37,99,235,.4)}
.trend-up{background:rgba(239,68,68,.15);color:#f87171}
.trend-down{background:rgba(34,197,94,.15);color:#4ade80}
.trend-flat{background:rgba(148,163,184,.1);color:var(--text-muted)}

/* CARD */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;transition:background .3s,border .3s}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card-title{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:8px}
.card.collapsed>.card-hdr{margin-bottom:0;padding-bottom:0;border-bottom:none}
.card.collapsed>*:not(.card-hdr){display:none!important}
.collapse-btn{background:rgba(128,128,128,.07);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-size:.75rem;font-weight:600;padding:4px 12px;border-radius:6px;margin-left:8px;transition:all .2s;white-space:nowrap;flex-shrink:0;line-height:1.6}
.collapse-btn:hover{color:var(--accent-cyan);background:rgba(6,182,212,.08);border-color:rgba(6,182,212,.3)}
.card.collapsed>.card-hdr{background:rgba(128,128,128,.03);border-radius:inherit}
.cb{font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(37,99,235,.15);color:var(--accent-cyan)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.tbl th{background:rgba(128,128,128,.06);color:var(--text-muted);font-weight:700;font-size:.7rem;letter-spacing:.5px;text-transform:uppercase;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border2);color:var(--text-primary);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(128,128,128,.03)}
.tbl-nowrap th,.tbl-nowrap td{white-space:nowrap;word-break:keep-all}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap}
.b-red{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.b-yellow{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.b-green{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.b-blue{background:rgba(37,99,235,.15);color:#60a5fa;border:1px solid rgba(37,99,235,.3)}
.b-purple{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.b-gray{background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid rgba(100,116,139,.3)}

/* PROGRESS */
.prg-wrap{background:rgba(128,128,128,.12);border-radius:6px;height:7px;overflow:hidden;flex:1}
.prg-bar{height:100%;border-radius:6px;transition:width .5s ease}

/* ALERTS */
.alert{border-radius:10px;padding:13px 16px;border-left:4px solid;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.alert.red{background:rgba(239,68,68,.07);border-color:var(--accent-red)}
.alert.yellow{background:rgba(245,158,11,.07);border-color:var(--accent-gold)}
.alert.green{background:rgba(34,197,94,.07);border-color:var(--accent-green)}
.alert.blue{background:rgba(37,99,235,.07);border-color:var(--accent-blue)}
.alert-icon{font-size:1.2rem;margin-top:1px}
.alert-body h4{font-size:.84rem;font-weight:700;margin-bottom:3px}
.alert-body p{font-size:.77rem;color:var(--text-muted);line-height:1.55}

/* STAT ROW */
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2)}
.srow:last-child{border-bottom:none}
.srow .sl{font-size:.81rem;color:var(--text-muted)}.srow .sv{font-size:.88rem;font-weight:700}

/* TIMELINE */
.tl{position:relative;padding-left:26px}
.tl::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:18px}
.tl-item::before{content:'';position:absolute;left:-23px;top:5px;width:11px;height:11px;border-radius:50%;background:var(--accent-blue);border:2px solid var(--bg-primary);box-shadow:0 0 8px rgba(37,99,235,.5)}
.tl-item.done::before{background:var(--accent-green);box-shadow:0 0 8px rgba(34,197,94,.5)}
.tl-item.issue::before{background:var(--accent-red);box-shadow:0 0 8px rgba(239,68,68,.5)}
.tl-date{font-size:.7rem;color:var(--text-dim);margin-bottom:2px}
.tl-title{font-size:.87rem;font-weight:700;margin-bottom:3px}
.tl-desc{font-size:.77rem;color:var(--text-muted);line-height:1.5}

/* MEETING INFO BAR */
.meeting-bar{background:linear-gradient(135deg,rgba(37,99,235,.1),rgba(6,182,212,.1));border:1px solid rgba(37,99,235,.25);border-radius:12px;padding:14px 20px;display:flex;gap:28px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.mbi{display:flex;flex-direction:column;gap:3px}
.mbi .ml{font-size:.67rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.mbi .mv{font-size:.87rem;font-weight:700}

/* M ICONS */
.mi{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;font-size:.7rem;font-weight:800;margin-right:3px}
.mi-man{background:rgba(168,85,247,.2);color:#c084fc}
.mi-machine{background:rgba(37,99,235,.2);color:#60a5fa}
.mi-material{background:rgba(245,158,11,.2);color:#fbbf24}
.mi-method{background:rgba(34,197,94,.2);color:#4ade80}

/* CHART */
.chart-wrap{position:relative;height:240px}

/* ACTION BUTTONS */
.btn-add{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#4ade80;font-size:.77rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-add:hover{background:rgba(34,197,94,.22)}
.btn-edit{display:inline-flex;align-items:center;justify-content:center;width:25px;height:25px;border-radius:6px;background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.28);color:#60a5fa;cursor:pointer;font-size:.72rem;transition:all .15s}
.btn-edit:hover{background:rgba(37,99,235,.28)}
.btn-edit-text{width:auto;height:30px;padding:0 12px;font-size:.76rem;font-weight:700;gap:4px;white-space:nowrap}
.btn-del{display:inline-flex;align-items:center;justify-content:center;width:25px;height:25px;border-radius:6px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171;cursor:pointer;font-size:.72rem;transition:all .15s}
.btn-del:hover{background:rgba(239,68,68,.25)}
.btn-print{background:rgba(37,99,235,.15);border:1px solid rgba(37,99,235,.35);color:var(--accent-cyan);border-radius:8px;padding:6px 14px;font-size:.77rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-print:hover{background:rgba(37,99,235,.3)}
.btn-new{display:flex;align-items:center;gap:5px;padding:0 14px;height:34px;border-radius:8px;border:1px solid rgba(34,197,94,.5);background:rgba(34,197,94,.15);color:#4ade80;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
.btn-new:hover{background:rgba(34,197,94,.3)}
.reset-opt{display:flex;flex-direction:column;gap:10px;padding:4px 0}
.reset-opt-btn{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text-primary);cursor:pointer;text-align:left;transition:all .2s;width:100%}
.reset-opt-btn:hover{background:rgba(128,128,128,.08);border-color:rgba(128,128,128,.3)}
.reset-opt-btn.danger:hover{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.35)}
.reset-opt-icon{font-size:1.5rem;flex-shrink:0;margin-top:1px}
.reset-opt-body h4{font-size:.88rem;font-weight:700;margin-bottom:3px}
.reset-opt-body p{font-size:.77rem;color:var(--text-muted);line-height:1.4}
/* IMPORT HIDDEN INPUT */
#importFile{display:none}
.btn-sec{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#fbbf24;border-radius:8px;padding:6px 13px;font-size:.77rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-sec:hover{background:rgba(245,158,11,.22)}
.act-cell{display:flex;gap:5px;align-items:center}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:min(560px,95vw);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.5);transform:scale(.95);transition:transform .2s,background .3s}
.modal-overlay.open .modal-box{transform:scale(1)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.modal-hdr h3{font-size:.98rem;font-weight:700}
.modal-x{width:28px;height:28px;border-radius:6px;background:rgba(128,128,128,.1);border:none;color:var(--text-muted);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-x:hover{background:rgba(239,68,68,.15);color:#f87171}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-ftr{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.frow{margin-bottom:13px}
.flbl{display:block;font-size:.72rem;font-weight:700;color:var(--text-muted);margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}
.finp{width:100%;background:rgba(128,128,128,.06);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text-primary);font-size:.87rem;font-family:inherit;transition:border-color .2s}
.finp:focus{outline:none;border-color:var(--accent-blue)}
textarea.finp{min-height:70px;resize:vertical}
select.finp option{background:#1a2135;color:var(--text-primary)}
body.light .finp{background:#f8fafc;border-color:#d1d9e6;color:#0f172a}
body.light select.finp option{background:#fff;color:#0f172a}
.btn-cancel{background:rgba(128,128,128,.1);border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:8px 18px;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-cancel:hover{background:rgba(128,128,128,.2);color:var(--text-primary)}
.btn-save{background:var(--accent-blue);border:none;color:#fff;border-radius:8px;padding:8px 24px;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-save:hover{background:#1d4ed8}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.form-2col{grid-template-columns:1fr}}

/* DONUT LEGEND */

function getAdminPwd() {
  return localStorage.getItem('qm_admin_pwd') || '0000';

function checkAdminPwd(callback) {
  _adminPwdCb = callback;
  const overlay = document.getElementById('adminPwdOverlay');
  overlay.querySelector('#adminPwdInput').value = '';
  overlay.querySelector('#adminPwdError').textContent = '';

function adminPwdSubmit() {
  const overlay = document.getElementById('adminPwdOverlay');
  const val = overlay.querySelector('#adminPwdInput').value;
  if (val === getAdminPwd()) {
    overlay.classList.remove('open');

    overlay.querySelector('#adminPwdError').textContent = '암호가 올바르지 않습니다.';

// ─── Firestore: 엑셀 파일 데이터 동기화 ───────────────────────
// type: 'vq' | 'fc' | 'sort' | 'hold'
// Firestore 문서 ID: file_{type}_{weekId}  (예: file_vq_2026-W21)
async function pushFileDataToFirestore(weekId, type, data) {
  if (!_fdb || !weekId || !data) return;
  try {
    const json = JSON.stringify(data);
    // Firestore 문서 1MB 제한 초과 방지 (약 900KB 이상이면 건너뜀)
    if (json.length > 990000) {
      const kb = (json.length/1024).toFixed(0);
      console.warn(`파일 데이터가 너무 큽니다 (${type}): ${kb}KB`);
      alert(`⚠️ 파일 크기(${kb}KB)가 너무 커서 다른 PC와 공유되지 않습니다.\n(Firestore 한도: 1MB, 실제 사용 가능: ~990KB)\n\n불필요한 열·행을 줄여 재업로드하세요.`);
      return;
    }
    await _fdb.collection('qm').doc(`file_${type}_${weekId}`).set({
      json,
      type,
      weekId,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    // main 문서에 fileUpdatedAt 기록 → 다른 PC가 파일 변경을 감지할 수 있도록
    _fdb.collection('qm').doc('main').set({ fileUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }).catch(() => {});
    // 업로드한 PC 자신은 재pull하지 않도록 방지 (서버 시각 오차 3초 여유)
    _lastFileUpdatedAtMs = Date.now() + 3000;
  } catch(e) { console.warn(`파일 데이터 Firestore 저장 실패 (${type}):`, e); }
}

async function pullFileDataFromFirestore(weekId, type) {
  if (!_fdb || !weekId) return null;
  try {
    // source:'server' → 항상 서버에서 최신 데이터 가져옴 (SDK 캐시 무시)
    const snap = await _fdb.collection('qm').doc(`file_${type}_${weekId}`).get({ source: 'server' });
    if (snap.exists && snap.data().json) {
      const srvTs = snap.data().updatedAt?.toMillis?.() || 0;
      console.log(`[sync:pull] ${type}@${weekId} 서버에서 로드 srvTs=${srvTs} size=${snap.data().json.length}`);
      return { data: JSON.parse(snap.data().json), srvTs };
    } else {
      console.log(`[sync:pull] ${type}@${weekId} Firestore에 문서 없음 → 업로드 필요`);
    }
  } catch(e) { console.warn(`파일 데이터 Firestore 로드 실패 (${type}):`, e); }
  return null;
}

async function pullCurrentSessionFilesFromFirestore(weekId) {
  if (!weekId) return;
  const [_vq, _fc, _sort, _hold] = await Promise.all([
    pullFileDataFromFirestore(weekId, 'vq'),
    pullFileDataFromFirestore(weekId, 'fc'),
    pullFileDataFromFirestore(weekId, 'sort'),
    pullFileDataFromFirestore(weekId, 'hold'),
  ]);
  let changed = false;
  // 서버 타임스탬프(srvTs) 기준으로 비교 — Date.now()는 PC마다 다르므로 사용 안 함
  function _applyFile(result, key, sessKey, setter) {
    if (!result) return;
    const { data: d, srvTs } = result;
    const typeTag = key.replace('qm_','').replace('_data','');
    const localSrvTs = (() => { try { return parseInt(localStorage.getItem(sessKey + '_srvts') || '0'); } catch(e) { return 0; } })();
    if (srvTs > 0 && localSrvTs > 0 && srvTs <= localSrvTs) {
      console.log(`[sync:pull] skip ${typeTag} – 이미 최신 (srvTs ${srvTs} <= local ${localSrvTs})`);
      return;
    }
    if (d._cleared) {
      setter(null);
      try { localStorage.removeItem(key); localStorage.removeItem(sessKey); localStorage.removeItem(sessKey + '_srvts'); } catch(e){}
      console.log(`[sync:pull] ${typeTag} 삭제 신호 적용`);
      changed = true;
    } else {
      setter(d);
      try { localStorage.setItem(key, JSON.stringify(d)); localStorage.setItem(sessKey, JSON.stringify(d)); if (srvTs > 0) localStorage.setItem(sessKey + '_srvts', String(srvTs)); } catch(e){}
      console.log(`[sync:pull] ${typeTag} 적용 완료 (rows=${d.rows?.length ?? '?'} srvTs=${srvTs})`);
      changed = true;
    }
  }
  _applyFile(_vq,   'qm_vq_data',   'qm_sess_vq_'+weekId,   v => { vqData   = v; });
  _applyFile(_fc,   'qm_fc_data',   'qm_sess_fc_'+weekId,   v => { fcData   = v; });
  _applyFile(_sort, 'qm_sort_data', 'qm_sess_sort_'+weekId, v => { sortData = v; });
  _applyFile(_hold, 'qm_hold_data', 'qm_sess_hold_'+weekId, v => { holdData = v; });
  if (changed) { renderAll(); setTimeout(initCharts, 80); setTimeout(initCollapsible, 120); }
}

// ── 파일 문서 실시간 리스너 (onSnapshot) ──────────────────────────────
// 폴링 대신 실시간 감지: 다른 PC 업로드/삭제를 즉시 반영
function subscribeFileListeners(weekId) {
  if (!_fdb || !weekId) return;
  if (weekId === _fileListenerWeekId) return; // 이미 이 주차로 구독 중
  // 기존 리스너 해제
  Object.values(_fileListeners).forEach(u => { try { u(); } catch(e) {} });
  _fileListeners = {};
  _fileListenerWeekId = weekId;

  const typeMap = {
    sort: { lsKey: 'qm_sort_data', sessPrefix: 'qm_sess_sort_', setter: v => { sortData = v; }, getter: () => sortData },
    vq:   { lsKey: 'qm_vq_data',   sessPrefix: 'qm_sess_vq_',   setter: v => { vqData   = v; }, getter: () => vqData   },
    fc:   { lsKey: 'qm_fc_data',   sessPrefix: 'qm_sess_fc_',   setter: v => { fcData   = v; }, getter: () => fcData   },
    hold: { lsKey: 'qm_hold_data', sessPrefix: 'qm_sess_hold_', setter: v => { holdData = v; }, getter: () => holdData },
  };

  console.log(`[sync] 파일 리스너 등록: weekId=${weekId} types=sort,vq,fc,hold`);
  ['sort','vq','fc','hold'].forEach(type => {
    const { lsKey, sessPrefix, setter, getter } = typeMap[type];
    const unsub = _fdb.collection('qm').doc('file_' + type + '_' + weekId).onSnapshot(snap => {
      // hasPendingWrites=true → 이 PC 자신이 방금 쓴 데이터 → 이미 로컬에 반영됨, 건너뜀
      if (snap.metadata.hasPendingWrites) return;
      // fromCache=true 이면 srvTs=0 이므로 아래 srvTs 비교에서 자동 처리됨
      if (!snap.exists || !snap.data().json) {
        console.log(`[sync:snap] ${type}@${weekId} 문서 없음 (Firestore에 업로드된 파일이 없음)`);
        return;
      }
      // 서버 타임스탬프로 비교 — Date.now()는 PC마다 달라 신뢰 불가
      const srvTs = snap.data().updatedAt?.toMillis?.() || 0;
      const srvTsKey = sessPrefix + weekId + '_srvts';
      const localSrvTs = (() => { try { return parseInt(localStorage.getItem(srvTsKey) || '0'); } catch(e) { return 0; } })();
      console.log(`[sync:snap] ${type}@${weekId} srvTs=${srvTs} local=${localSrvTs} size=${snap.data().json.length}`);
      if (srvTs > 0 && localSrvTs > 0 && srvTs <= localSrvTs) {
        console.log(`[sync:snap] skip ${type} – 이미 최신 (srvTs ${srvTs} <= local ${localSrvTs})`);
        return;
      }
      let data;
      try { data = JSON.parse(snap.data().json); } catch(e) { console.warn(`[sync:snap] ${type} JSON 파싱 오류:`, e); return; }
      if (data._cleared) {
        setter(null);
        try { localStorage.removeItem(lsKey); localStorage.removeItem(sessPrefix + weekId); localStorage.removeItem(srvTsKey); } catch(e) {}
        console.log(`[sync:snap] ${type}@${weekId} 삭제 신호 적용`);
      } else {
        setter(data);
        try { localStorage.setItem(lsKey, JSON.stringify(data)); localStorage.setItem(sessPrefix + weekId, JSON.stringify(data)); if (srvTs > 0) localStorage.setItem(srvTsKey, String(srvTs)); } catch(e) {}
        console.log(`[sync:snap] ${type}@${weekId} 적용 완료 (rows=${data.rows?.length ?? '?'})`);
      }
      renderAll();
      setTimeout(initCollapsible, 80);
    }, err => console.warn('파일 리스너 오류 (' + type + '):', err));
    _fileListeners[type] = unsub;
  });
}

function setSyncStatus(s) {
  const el = document.getElementById('syncBadge');
  if (!el) return;
  const m = {
    syncing: { t:'↻', c:'#f59e0b', i:'동기화 중…' },
    ok:      { t:'☁', c:'#22c55e', i:'동기화 완료 · 클릭하면 수동 새로고침' },
    error:   { t:'✗', c:'#ef4444', i:'동기화 실패 · 클릭하면 재시도' },
    offline: { t:'●', c:'#64748b', i:'오프라인' }
  };
  const v = m[s] || m.offline;
  el.textContent = v.t; el.style.color = v.c; el.title = v.i;
}

async function pushToFirestore() {
  if (!_fdb) { setSyncStatus('offline'); return; }
  setSyncStatus('syncing');
  try {
    await _fdb.collection('qm').doc('main').set({
      json: JSON.stringify(DB),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    setSyncStatus('ok');
  } catch(e) { console.warn('Firestore push failed:', e); setSyncStatus('error'); }
}

function manualSync() {
  // 수동 동기화: srvTs 캐시 초기화 → srvTs 비교 없이 Firestore에서 항상 최신 재pull
  const wid = _currentSessionId;
  if (wid) {
    ['sort','vq','fc','hold'].forEach(t => {
      try { localStorage.removeItem(`qm_sess_${t}_${wid}_srvts`); } catch(e) {}
    });
  }
  _lastFilePullWeekId = null;
  pullFromFirestore();
  if (wid) pullCurrentSessionFilesFromFirestore(wid);
}

async function pullFromFirestore() {
  if (!_fdb) { setSyncStatus('offline'); return; }
  setSyncStatus('syncing');
  try {
    const snap = await _fdb.collection('qm').doc('main').get();
    if (snap.exists && snap.data().json) {
      const remote = JSON.parse(snap.data().json);
      const remoteWeekId = getWeekId(remote);

      // _currentSessionId가 null이면 초기 로드 상태 → 무조건 pull (폰 첫 진입 등)
      // _currentSessionId가 세팅됐고 remote와 주차가 다르면 → 동시 사용 충돌 방지
      if (remoteWeekId && _currentSessionId && remoteWeekId !== _currentSessionId) {
        // 다른 기기가 다른 주차를 보고 있음 — 현재 DB는 건드리지 않고 세션 목록만 갱신
        const _list = loadSessionList();
        const _meta = getSessionMeta(remoteWeekId, remote);
        const _idx = _list.findIndex(s => s.weekId === remoteWeekId);
        if (_idx >= 0) _list[_idx] = _meta; else _list.push(_meta);
        _list.sort((a, b) => a.weekId < b.weekId ? 1 : -1);
        saveSessionList(_list);
        saveSessionData(remoteWeekId, remote);
        renderFilterBar();
        setSyncStatus('ok');
        return;
      }

      // ── 전체 초기화 신호: remoteWeekId가 null = PC A가 모든 데이터 삭제 ──
      if (!remoteWeekId) {
        // 로컬 세션 데이터·세션 목록·persistent 전부 제거
        Object.keys(localStorage).filter(k => k.startsWith('qm_')).forEach(k => localStorage.removeItem(k));
        DB = JSON.parse(JSON.stringify(DEFAULTS));
        vqData = null; fcData = null; sortData = null; holdData = null;
        _currentSessionId = null;
        const wb = document.getElementById('weekBadge');
        if (wb) wb.textContent = '';
        renderAll();
        setTimeout(initCharts, 100);
        setTimeout(initCollapsible, 150);
        renderFilterBar();
        setSyncStatus('ok');
        return;
      }

      Object.assign(DB, remote);
      _applyPersistent(); // 주차 무관 필드는 로컬 최신값 유지
      localStorage.setItem('qm_data', JSON.stringify(DB));
      _currentSessionId = getWeekId(DB);
      subscribeFileListeners(_currentSessionId); // 세션 확정 → 파일 실시간 리스너 등록
      // 세션 목록만 로컬 갱신 (Firestore에 다시 push하지 않음 — 불필요한 왕복 방지)
      const _pullWeekId = _currentSessionId;
      if (_pullWeekId) {
        const _list = loadSessionList();
        const _meta = getSessionMeta(_pullWeekId, DB);
        const _idx = _list.findIndex(s => s.weekId === _pullWeekId);
        if (_idx >= 0) _list[_idx] = _meta; else _list.push(_meta);
        _list.sort((a, b) => a.weekId < b.weekId ? 1 : -1);
        saveSessionList(_list);
        saveSessionData(_pullWeekId, DB);
        const wb = document.getElementById('weekBadge');
        if (wb) wb.textContent = DB.meeting.week || _pullWeekId;
      }
      renderAll();
      setTimeout(initCharts, 100);
      setTimeout(initCollapsible, 150);
      renderFilterBar();
      // 다른 PC가 파일을 업로드했는지 fileUpdatedAt으로 감지 → 강제 재pull
      try {
        const _remoteFileMs = (() => { const f = snap.data().fileUpdatedAt; return f && f.toMillis ? f.toMillis() : 0; })();
        if (_remoteFileMs > _lastFileUpdatedAtMs) { _lastFileUpdatedAtMs = _remoteFileMs; _lastFilePullWeekId = null; }
      } catch(e) {}
      // 파일 데이터 pull: weekId 변경 시, 파일이 없을 때, 또는 다른 PC가 파일 업로드 시
      const _filesNeedPull = !vqData || !fcData || !sortData || !holdData || _pullWeekId !== _lastFilePullWeekId;
      if (_pullWeekId && _filesNeedPull) {
        _lastFilePullWeekId = _pullWeekId;
        pullCurrentSessionFilesFromFirestore(_pullWeekId);
      }
    } else if (!_currentSessionId) {
      // main 문서가 없고 아직 로드된 세션도 없는 경우 → 세션 목록에서 최신 세션 자동 로드
      await _tryAutoLoadLatestSession();
    }
    setSyncStatus('ok');
  } catch(e) { console.warn('Firestore pull failed:', e); setSyncStatus('error'); }
}

async function _tryAutoLoadLatestSession() {
  if (!_fdb) return;
  try {
    const snaps = await _fdb.collection('qm').where('weekId', '!=', null).get();
    let latest = null;
    snaps.forEach(doc => {
      const d = doc.data();
      if (!d.weekId || !d.json) return;
      if (!latest || d.weekId > latest.weekId) latest = d;
    });
    if (!latest) return;
    const db = JSON.parse(latest.json);
    saveSessionData(latest.weekId, db);
    const list = loadSessionList();
    if (!list.find(s => s.weekId === latest.weekId)) {
      list.push(getSessionMeta(latest.weekId, db));
      list.sort((a, b) => a.weekId < b.weekId ? 1 : -1);
      saveSessionList(list);
    }
    // 자동 로드 (현재 PC에 아무 세션도 없으면)
    DB = db;
    _currentSessionId = latest.weekId;
    _applyPersistent();
    localStorage.setItem('qm_data', JSON.stringify(DB));
    const wb = document.getElementById('weekBadge');
    if (wb) wb.textContent = DB.meeting.week || latest.weekId;
    renderAll();
    setTimeout(initCharts, 100);
    setTimeout(initCollapsible, 150);
    renderFilterBar();
    if (!vqData || !fcData || !sortData || !holdData) {
      pullCurrentSessionFilesFromFirestore(latest.weekId);
    }
  } catch(e) { console.warn('세션 자동 로드 실패:', e); }
}

function loadData() {
  try {
    const saved = localStorage.getItem('qm_data');
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULTS));
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULTS)); }
}

// SESSION MANAGEMENT (년/월/주 필터)

function getWeekId(db) {
  const m = (db.meeting.week || '').match(/(\d{4})년\s*(\d+)주차/);
  if (m) return `${m[1]}-W${String(m[2]).padStart(2,'0')}`;
  if (db.meeting.date) {
    const d = new Date(db.meeting.date);
    if (!isNaN(d)) return `${d.getFullYear()}-W${String(getWeekNum(d)).padStart(2,'0')}`;
  }
  return null;
}

function getSessionMeta(weekId, db) {
  const [yr, wPart] = weekId.split('-W');
  const wk = parseInt(wPart, 10);
  // 해당 주의 월 계산: 주차 시작일(월요일) 기준
  const jan1 = new Date(parseInt(yr, 10), 0, 1);
  const dayOfWeek = jan1.getDay() || 7;
  const startOfWeek = new Date(jan1);
  startOfWeek.setDate(jan1.getDate() + (wk - 1) * 7 - (dayOfWeek - 1));
  const month = startOfWeek.getMonth() + 1;
  return { weekId, year: parseInt(yr, 10), month, week: wk, label: db.meeting.week || `${yr}년 ${wk}주차`, date: db.meeting.date || '' };
}

function loadSessionList() {
  try {
    const s = localStorage.getItem('qm_session_list');
    return s ? JSON.parse(s) : [];
  } catch(e) { return []; }
}

function saveSessionList(list) {
  localStorage.setItem('qm_session_list', JSON.stringify(list));
}

function saveSessionData(weekId, db) {

  } catch(e) { console.warn('세션 저장 실패(용량 초과일 수 있음):', e); }
}

function loadSessionData(weekId) {

async function pullSessionFromFirestore(weekId) {

  try {
    const snap = await _fdb.collection('qm').doc(`sess_${weekId}`).get();
    if (snap.exists && snap.data().json) return JSON.parse(snap.data().json);

async function pullSessionListFromFirestore() {
  if (!_fdb) return;
  try {
    const snaps = await _fdb.collection('qm').where('weekId', '!=', null).get();

    // Firestore에 존재하는 weekId 집합
    const fsIds = new Set();
    snaps.forEach(doc => { if (doc.data().weekId) fsIds.add(doc.data().weekId); });

    let list = loadSessionList();
    let changed = false;

    // Firestore에서 삭제된 세션을 로컬에서도 제거
    const removed = list.filter(s => !fsIds.has(s.weekId));
    if (removed.length > 0) {
      removed.forEach(s => {
        ['', '_vq', '_fc', '_sort', '_hold'].forEach(suffix => {
          localStorage.removeItem(`qm_sess${suffix}_${s.weekId}`);
        });
      });
      list = list.filter(s => fsIds.has(s.weekId));
      changed = true;
    }

    // Firestore에 있지만 로컬에 없는 세션 추가
    snaps.forEach(doc => {
      const d = doc.data();
      if (!d.weekId || !d.json) return;
      if (!list.find(s => s.weekId === d.weekId)) {
        try {
          const db = JSON.parse(d.json);
          list.push(getSessionMeta(d.weekId, db));
          saveSessionData(d.weekId, db);
          changed = true;
        } catch(e) {}
      }
    });

    if (changed) { saveSessionList(list); renderFilterBar(); }

    // 현재 보고 있는 세션이 Firestore에서 삭제된 경우 → 다른 세션으로 전환
    if (_currentSessionId && !fsIds.has(_currentSessionId)) {
      if (list.length > 0) {
        const sorted = [...list].sort((a, b) => b.weekId < a.weekId ? -1 : 1);
        switchSession(sorted[0].weekId);
      } else {
        // 모든 세션이 다른 PC에서 삭제됨 → 완전 초기화
        DB = JSON.parse(JSON.stringify(DEFAULTS));
        vqData = null; fcData = null; sortData = null; holdData = null;
        _currentSessionId = null;
        Object.keys(localStorage).filter(k => k.startsWith('qm_')).forEach(k => localStorage.removeItem(k));
        const wb = document.getElementById('weekBadge');
        if (wb) wb.textContent = '';
        renderAll();
        setTimeout(initCharts, 100);
        setTimeout(initCollapsible, 150);
        renderFilterBar();
      }
      return;
    }

    // 세션 목록은 있지만 현재 로드된 세션이 없는 경우 → 최신 세션 자동 로드
    if (!_currentSessionId && list.length > 0) {
      const sorted = [...list].sort((a, b) => b.weekId < a.weekId ? -1 : 1);
      switchSession(sorted[0].weekId);
    }
  } catch(e) { console.warn('세션 목록 Firestore 조회 실패:', e); }
}

let _currentSessionId = null;

// ── 주차 무관 영구 보관 필드 ──────────────────────────────────────
const PERSISTENT_KEYS = ['claims','fourm','improvements','issues','issueTracker','customerDefects'];

function _applyPersistent() {
  try {
    const s = localStorage.getItem('qm_persistent');
    if (!s) return;
    const p = JSON.parse(s);
    PERSISTENT_KEYS.forEach(k => { if (Array.isArray(p[k])) DB[k] = p[k]; });
  } catch(e) {}
}

function loadPersistent() {
  try {
    const s = localStorage.getItem('qm_persistent');
    if (!s) return;
    const p = JSON.parse(s);
    PERSISTENT_KEYS.forEach(k => { if (Array.isArray(p[k])) DB[k] = p[k]; });
  } catch(e) {}
}

function savePersistent() {
  try {
    const p = {};
    PERSISTENT_KEYS.forEach(k => { p[k] = DB[k] || []; });
    p._savedAt = Date.now();
    localStorage.setItem('qm_persistent', JSON.stringify(p));
  } catch(e) {}
  pushPersistentToFirestore();
}

async function pushPersistentToFirestore() {
  if (!_fdb) return;
  try {
    const p = {};
    PERSISTENT_KEYS.forEach(k => { p[k] = DB[k] || []; });
    await _fdb.collection('qm').doc('persistent').set({
      json: JSON.stringify(p),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) { console.warn('persistent Firestore 저장 실패:', e); }
}

async function pullPersistentFromFirestore() {
  if (!_fdb) return;
  try {
    const snap = await _fdb.collection('qm').doc('persistent').get();
    if (!snap.exists || !snap.data().json) {
      // Firestore에 persistent 문서가 없으면 현재 DB로 최초 생성
      pushPersistentToFirestore();
      return;
    }
    // 로컬 저장 시각과 Firestore 저장 시각 비교 → 더 최신 데이터를 우선
    const firestoreMs = snap.data().updatedAt ? snap.data().updatedAt.toMillis() : 0;
    let localMs = 0;
    try { const lp = JSON.parse(localStorage.getItem('qm_persistent') || '{}'); localMs = lp._savedAt || 0; } catch(e) {}
    if (localMs > firestoreMs) {
      // 로컬이 더 최신 (삭제·수정 후 아직 Firestore 미반영) → 로컬을 Firestore에 push
      pushPersistentToFirestore();
      return;
    }
    const p = JSON.parse(snap.data().json);
    let changed = false;
    PERSISTENT_KEYS.forEach(k => { if (Array.isArray(p[k])) { DB[k] = p[k]; changed = true; } });
    if (changed) {
      localStorage.setItem('qm_persistent', snap.data().json);
      renderAll();
      setTimeout(initCharts, 80);
    }
  } catch(e) { console.warn('persistent Firestore 로드 실패:', e); }
}

function persistCurrentSession() {
  const weekId = getWeekId(DB);
  if (!weekId) return;
  _currentSessionId = weekId;
  const wb = document.getElementById('weekBadge');
  if (wb) wb.textContent = DB.meeting.week || weekId;
  const list = loadSessionList();
  const meta = getSessionMeta(weekId, DB);
  const idx = list.findIndex(s => s.weekId === weekId);
  if (idx >= 0) list[idx] = meta; else list.push(meta);
  list.sort((a, b) => a.weekId < b.weekId ? 1 : -1);
  saveSessionList(list);
  saveSessionData(weekId, DB);
  try { localStorage.setItem('qm_sess_vq_'+weekId, JSON.stringify(vqData)); } catch(e) {}
  try { localStorage.setItem('qm_sess_fc_'+weekId, JSON.stringify(fcData)); } catch(e) {}
  try { localStorage.setItem('qm_sess_sort_'+weekId, JSON.stringify(sortData)); } catch(e) {}
  try { localStorage.setItem('qm_sess_hold_'+weekId, JSON.stringify(holdData)); } catch(e) {}
  pushSessionToFirestore(weekId, DB);
  renderFilterBar();
}

async function switchSession(weekId) {
  // 먼저 localStorage 캐시에서 로드
  let data = loadSessionData(weekId);
  if (!data) {
    setSyncStatus('syncing');
    data = await pullSessionFromFirestore(weekId);
    if (data) { saveSessionData(weekId, data); setSyncStatus('ok'); }
    else { setSyncStatus('error'); alert('해당 주차 데이터를 찾을 수 없습니다.'); return; }
  }
  DB = data;
  _currentSessionId = weekId;
  subscribeFileListeners(weekId); // 세션 전환 → 새 주차 파일 리스너 등록
  _applyPersistent(); // 주차 무관 필드(클레임·4M·이슈 등) 최신값으로 복원
  localStorage.setItem('qm_data', JSON.stringify(DB));
  // 세션별 파일 데이터 복원
  try { const s = localStorage.getItem('qm_sess_vq_'+weekId); vqData = s ? JSON.parse(s) : null; } catch(e) { vqData = null; }
  try { const s = localStorage.getItem('qm_sess_fc_'+weekId); fcData = s ? JSON.parse(s) : null; } catch(e) { fcData = null; }
  try { const s = localStorage.getItem('qm_sess_sort_'+weekId); sortData = s ? JSON.parse(s) : null; } catch(e) { sortData = null; }
  try { const s = localStorage.getItem('qm_sess_hold_'+weekId); holdData = s ? JSON.parse(s) : null; } catch(e) { holdData = null; }
  try { localStorage.setItem('qm_vq_data', JSON.stringify(vqData)); } catch(e) {}
  try { localStorage.setItem('qm_fc_data', JSON.stringify(fcData)); } catch(e) {}
  try { localStorage.setItem('qm_sort_data', JSON.stringify(sortData)); } catch(e) {}
  try { localStorage.setItem('qm_hold_data', JSON.stringify(holdData)); } catch(e) {}
  _lastFilePullTime = 0; // 세션 전환 시 파일 버전 초기화 → 다음 poll에서 Firestore 최신 파일 강제 재pull
  document.getElementById('weekBadge').textContent = DB.meeting.week || weekId;
  renderAll();
  setTimeout(initCharts, 100);
  setTimeout(initCollapsible, 150);
  renderFilterBar();
  // localStorage에 없는 파일은 Firestore에서 즉시 pull; 있어도 다음 20s poll에서 최신 여부 확인
  const _needPull = !vqData || !fcData || !sortData || !holdData;
  if (_needPull) { _lastFilePullTime = Date.now(); pullCurrentSessionFilesFromFirestore(weekId); }
}

function renderFilterBar() {
  const list = loadSessionList();
  const selYear  = document.getElementById('filterYear');
  const selMonth = document.getElementById('filterMonth');
  const selWeek  = document.getElementById('filterWeek');
  if (!selYear) return;

  const curId = _currentSessionId || getWeekId(DB);

  // 년도 목록
  const years = [...new Set(list.map(s => s.year))].sort((a,b) => b - a);
  const curMeta = curId ? list.find(s => s.weekId === curId) : null;
  const selY = selYear.value || (curMeta ? String(curMeta.year) : (years[0] ? String(years[0]) : ''));

  selYear.innerHTML = '<option value="">년도</option>' +
    years.map(y => `<option value="${y}"${String(y) === selY ? ' selected' : ''}>${y}년</option>`).join('');

  // 월 목록 (선택된 년도 기준)
  const months = selY
    ? [...new Set(list.filter(s => String(s.year) === selY).map(s => s.month))].sort((a,b) => b - a)
    : [];
  const selM = selMonth.value || (curMeta && String(curMeta.year) === selY ? String(curMeta.month) : (months[0] ? String(months[0]) : ''));

  selMonth.innerHTML = '<option value="">월</option>' +
    months.map(m => `<option value="${m}"${String(m) === selM ? ' selected' : ''}>${m}월</option>`).join('');

  // 주차 목록 (선택된 년도+월 기준)
  const weeks = (selY && selM)
    ? list.filter(s => String(s.year) === selY && String(s.month) === selM)
          .sort((a,b) => b.week - a.week)
    : [];
  const selW = selWeek.value || (curMeta && String(curMeta.year) === selY && String(curMeta.month) === selM ? curMeta.weekId : (weeks[0] ? weeks[0].weekId : ''));

  selWeek.innerHTML = '<option value="">주차</option>' +
    weeks.map(w => `<option value="${w.weekId}"${w.weekId === selW ? ' selected' : ''}>${w.week}주차 (${w.label})</option>`).join('');

  // 현재 배지
  const badge = document.getElementById('filterCurBadge');
  if (badge) badge.textContent = curMeta ? curMeta.label : (DB.meeting.week || '현재 주차');

  // 세션 수
  const cnt = document.getElementById('filterSessionCount');
  if (cnt) cnt.textContent = list.length ? `총 ${list.length}주 저장됨` : '';

  // 이전/다음 버튼 활성화
  const allIds = list.map(s => s.weekId).sort();
  const ci = allIds.indexOf(curId || '');
  const prevBtn = document.getElementById('filterPrevBtn');
  const nextBtn = document.getElementById('filterNextBtn');
  if (prevBtn) prevBtn.disabled = ci <= 0;
  if (nextBtn) nextBtn.disabled = ci < 0 || ci >= allIds.length - 1;
}

function deleteCurrentSession() {
  const weekId = _currentSessionId || getWeekId(DB);
  if (!weekId) { alert('삭제할 주차가 선택되지 않았습니다.'); return; }
  const list = loadSessionList();
  const meta = list.find(s => s.weekId === weekId);
  const label = meta ? meta.label : weekId;
  checkAdminPwd(async () => {
    if (!confirm(`"${label}" 주차 데이터를 삭제하시겠습니까?\n\n업로드된 파일 데이터도 함께 삭제되며 되돌릴 수 없습니다.`)) return;
    // 목록에서 제거
    const newList = list.filter(s => s.weekId !== weekId);
    saveSessionList(newList);
    // localStorage 항목 모두 제거
    ['','_vq','_fc','_sort','_hold'].forEach(suffix => {
      localStorage.removeItem('qm_sess'+suffix+'_'+weekId);
    });
    ['vq','fc','sort','hold'].forEach(t => {
      localStorage.removeItem('qm_sess_' + t + '_' + weekId + '_srvts');
    });
    // Firestore에서 세션/파일 데이터 영구 삭제 (main은 바로 덮어쓸 것이므로 삭제 안 함)
    if (_fdb) {
      ['sess_', 'file_vq_', 'file_fc_', 'file_sort_', 'file_hold_'].forEach(prefix => {
        _fdb.collection('qm').doc(prefix + weekId).delete().catch(e => console.warn('Firestore 삭제 실패:', e));
      });
    }
    // 나머지 세션 중 가장 최근으로 이동, 없으면 초기화
    if (newList.length > 0) {
      const sorted = [...newList].sort((a,b) => b.weekId < a.weekId ? -1 : 1);
      await switchSession(sorted[0].weekId);
      pushToFirestore(); // main을 새 현재 세션으로 갱신 → 다른 PC 동기화
    } else {
      DB = JSON.parse(JSON.stringify(DEFAULTS));
      vqData = null; fcData = null; sortData = null; holdData = null;
      _currentSessionId = null;
      // 로컬 스토리지 qm_ 정리 (마스터 데이터·설정값은 제외)
      const _keepKeys = new Set(['qm_vendor_master','qm_customer_master','qm_price_master','qm_admin_pwd','qm_theme']);
      Object.keys(localStorage).filter(k => k.startsWith('qm_') && !_keepKeys.has(k)).forEach(k => localStorage.removeItem(k));
      renderAll();
      setTimeout(initCharts, 100);
      setTimeout(initCollapsible, 150);
      renderFilterBar();
      // Firestore: main을 빈 상태(=초기화 신호)로, persistent도 빈 배열로 갱신
      pushToFirestore();
      savePersistent(); // DB=DEFAULTS → 빈 배열을 Firestore persistent에 저장
    }
  });
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const parsed = JSON.parse(evt.target.result);
      if (!parsed.meeting) throw new Error('형식 오류');
      vqData = parsed._vqData || null;
      delete parsed._vqData;
      DB = parsed;
      try { localStorage.setItem('qm_vq_data', JSON.stringify(vqData)); } catch(e) {}
      saveData(); refresh();
      alert('데이터를 성공적으로 불러왔습니다.');
    } catch(err) {
      alert('파일 형식이 올바르지 않습니다.\n내보내기로 저장한 JSON 파일을 사용해주세요.');
    }
  };
  reader.readAsText(file);
}

function defRate(line) {
  return line.produced ? (line.defects / line.produced * 100) : 0;
}
function lineStatus(line) {
  const r = defRate(line);
  if (r > line.target * 1.1) return '불량';
  if (r > line.target * 0.9) return '주의';
  return '정상';
}
function prgColor(p) {
  if (p >= 100) return '#22c55e';
  if (p >= 70) return '#2563eb';
  if (p >= 40) return '#f59e0b';
  return '#ef4444';
}
function mIcon(type) {
  const map = {Man:['인','mi-man'],Machine:['기','mi-machine'],Material:['재','mi-material'],Method:['법','mi-method']};
  const [l,c] = map[type]||['?','mi-man'];
  return `<span class="mi ${c}">${l}</span>`;
}

function getWeekNum(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
  const y = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-y)/86400000)+1)/7);
}

let _modalSave = null;
let _mdOnOverlay = false;

function openModal(title, schema, record, onSave) {
  document.getElementById('modalTitle').textContent = title;
  const form = document.getElementById('modalForm');
  form.innerHTML = schema.map(f => {
    const v = record ? (record[f.k] ?? '') : '';
    let input = '';
    if (f.t === 'partslist') {
      input = `<input type="text" class="finp" data-key="${f.k}" value="${esc(v)}" list="partsList" placeholder="품번 검색 또는 직접 입력…" autocomplete="off">`;
    } else if (f.t === 'vendorslist') {
      input = `<input type="text" class="finp" data-key="${f.k}" value="${esc(v)}" list="vendorsList" placeholder="업체명 검색 또는 직접 입력…" autocomplete="off">`;
    } else if (f.t === 'customerslist') {
      input = `<input type="text" class="finp" data-key="${f.k}" value="${esc(v)}" list="customersList" placeholder="고객사 검색 또는 직접 입력…" autocomplete="off">`;
    } else if (f.t === 'select') {
      input = `<select class="finp" data-key="${f.k}">${f.opts.map(o=>`<option value="${esc(o)}"${o==v?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
    } else if (f.t === 'textarea') {
      input = `<textarea class="finp" data-key="${f.k}" rows="3">${esc(v)}</textarea>`;
    } else if (f.t === 'color') {
      input = `<div style="display:flex;gap:8px;align-items:center"><input type="color" class="finp" data-key="${f.k}" value="${esc(v)||'#2563eb'}" style="width:48px;height:36px;padding:2px;cursor:pointer"><input type="text" class="finp" data-key="${f.k}_txt" value="${esc(v)}" style="flex:1" oninput="document.querySelector('[data-key=${f.k}]').value=this.value"></div>`;
    } else {
      input = `<input type="${f.t}" class="finp" data-key="${f.k}" value="${esc(v)}">`;
    }
    return `<div class="frow"><label class="flbl">${esc(f.l)}</label>${input}</div>`;
  }).join('');

  // sync color text→picker
  form.querySelectorAll('input[type=color]').forEach(el => {
    el.addEventListener('input', () => {
      const txt = form.querySelector(`[data-key="${el.dataset.key}_txt"]`);
      if (txt) txt.value = el.value;
    });
  });

  _modalSave = () => {
    const result = {};
    schema.forEach(f => {
      const el = form.querySelector(`[data-key="${f.k}"]`);
      if (!el) return;
      result[f.k] = f.t === 'number' ? parseFloat(el.value)||0 : el.value;
    });
    onSave(result);
    closeModal();
  };
  document.getElementById('modalSave').onclick = _modalSave;
  document.getElementById('modal').classList.add('open');
  setTimeout(() => form.querySelector('.finp')?.focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalSave').style.display = '';
}

function calcDashboardKpi() {
  const urgentCount  = (DB.issues||[]).filter(x => x.priority === '긴급').length;

  // 고객 불량 현황 집계
  const _cdAll = DB.customerDefects || [];
  const _cdThisYear  = new Date().getFullYear();
  const _cdThisMonth = new Date().getMonth() + 1;
  const _cdYearData  = _cdAll.filter(r => r.year === _cdThisYear);
  const _cdYearTotal = _cdYearData.reduce((s, r) => s + (r.qty || 1), 0);
  const _cdMonthTotal = _cdYearData.filter(r => r.month === _cdThisMonth).reduce((s, r) => s + (r.qty || 1), 0);
  // 고객사별 합계 → 최다 불량 고객사
  const _cdCustMap = {};
  _cdYearData.forEach(r => { if (r.customer) _cdCustMap[r.customer] = (_cdCustMap[r.customer] || 0) + (r.qty || 1); });
  const _cdCustCount = Object.keys(_cdCustMap).length;
  const _cdTop = Object.entries(_cdCustMap).sort((a,b)=>b[1]-a[1])[0];

  // 실패비용 분석 탭 데이터 사용 (fcData 업로드 우선, 없으면 DB.lines calcFailureCosts)
  let _fcTotal = 0, _fcCount = 0, _fcSub = '실패비용 탭에서 파일을 업로드하거나 단가를 입력하세요';
  if (fcData && fcData.rows && fcData.rows.length) {
    const _fca = buildFcAnalysis(fcData);
    _fcTotal = _fca.grandTotalCost;
    _fcCount = _fca.parts.filter(p=>p.totalCost>0).length;
    _fcSub = `불량수량×단가 합계 · ${_fca.parts.length}개 품번`;
  } else {
    const _fc = calcFailureCosts();
    _fcTotal = _fc.reduce((s,c)=>s+c.total, 0);
    _fcCount = _fc.filter(c=>c.total>0).length;
    if (_fcTotal > 0) _fcSub = `재작업+폐기+기타 · ${_fcCount}개 업체`;
  }

  // 업체별 품질현황 파일 데이터 (총 불량 수량용)
  const vqa = (vqData && vqData.rows && vqData.rows.length) ? buildVqAnalysis(vqData) : null;
  const hasQty  = vqa && vqa.grandTotalQty  > 0;

  return [
    {
      icon: DB.kpi[0]?.icon||'💰', color: DB.kpi[0]?.color||'#2563eb',
      label: '총 실패 비용',
      value: _fcTotal > 0 ? fmtWon(_fcTotal) : '—',
      sub: _fcTotal > 0 ? _fcSub : '실패비용 탭에서 파일을 업로드하거나 단가를 입력하세요',
      trendType: _fcTotal > 0 ? 'up' : 'flat',
      trendVal: _fcTotal > 0 ? `${_fcCount}개 품번` : '— 미입력',
    },
    {
      icon: DB.kpi[1]?.icon||'🏭', color: DB.kpi[1]?.color||'#22c55e',
      label: '총 불량 수량',
      value: hasQty ? vqa.grandTotalQty.toLocaleString()+'개' : '—',
      sub: hasQty
        ? `${vqa.rowCount.toLocaleString()}행 분석 · ${vqa.vendors[0]?.name||''} 최다`
        : '업체별 품질현황 탭에서 파일을 업로드하세요',
      trendType: hasQty ? 'up' : 'flat',
      trendVal: hasQty ? `${vqa.vendors.length}개 업체` : '— 미업로드',
    },
    {
      icon: DB.kpi[2]?.icon||'📋', color: DB.kpi[2]?.color||'#f59e0b',
      label: '고객 불량 현황',
      value: _cdYearTotal > 0 ? _cdYearTotal.toLocaleString() + '건' : '—',
      sub: _cdYearTotal > 0
        ? `이번달 ${_cdMonthTotal}건 · ${_cdCustCount}개 고객사`
        : '고객 불량 현황 탭에서 등록하세요',
      trendType: _cdMonthTotal > 0 ? 'up' : 'flat',
      trendVal: _cdTop ? `최다: ${_cdTop[0]} (${_cdTop[1]}건)` : '— 없음',
    },
    {
      icon: DB.kpi[3]?.icon||'⚠️', color: DB.kpi[3]?.color||'#ef4444',
      label: '긴급 이슈',
      value: urgentCount + '건',
      sub: urgentCount > 0 ? '즉각 대응 필요' : '현재 없음',
      trendType: urgentCount > 0 ? 'up' : 'flat',
      trendVal: urgentCount > 0 ? '▲ 조치중' : '— 정상',
    },
  ];
}

function lookupUnitCost(product) {
  if (!product || !PRICE_MASTER.length) return null;
  const p = String(product).toLowerCase().trim();
  return PRICE_MASTER.find(m => {
    const pNo   = (m.partNo   || '').toLowerCase().trim();
    const pName = (m.partName || '').toLowerCase().trim();
    return (pNo   && (p.includes(pNo)   || pNo.includes(p)))   ||
           (pName && (p.includes(pName) || pName.includes(p)));
  }) || null;
}

function calcFailureCosts() {
  return (DB.lines || []).map(l => {
    const rework     = +l.rework || 0;
    const scrap      = +l.scrap  || 0;
    const priceEntry = lookupUnitCost(l.product);
    const baseUnit   = priceEntry ? +priceEntry.costUnit : 0;
    const reworkUnit = priceEntry ? baseUnit * 2 : (+l.reworkCostUnit || 0);
    const scrapUnit  = priceEntry ? baseUnit     : (+l.scrapCostUnit  || 0);
    const reworkCost = rework * reworkUnit;
    const scrapCost  = scrap  * scrapUnit;
    const extra      = +l.extraCost || 0;
    const total      = reworkCost + scrapCost + extra;
    return { id: l.id, name: l.name, product: l.product,
             rework, scrap, reworkUnit, scrapUnit, reworkCost, scrapCost, extra, total,
             fromMaster: !!priceEntry };
  }).sort((a, b) => b.total - a.total);
}

function fmtWon(n) {
  return '₩' + Math.round(n).toLocaleString('ko-KR');
}

function calcDefectKpi() {
  // 선별실적 파일 데이터 우선 사용
  if (sortData && sortData.rows && sortData.rows.length) {
    const a = buildSortAnalysis(sortData);
    const top = a.defectTypeList[0];
    return [
      { icon:'🔍', color:'#2563eb', label:'총 검사수량',
        value: a.totalInspQty.toLocaleString()+'개',
        sub: `${a.rowCount.toLocaleString()}행 · ${esc(sortData.fileName||'—')}`,
        trendType:'flat', trendVal:'— 실측' },
      { icon:'⚠️', color:'#ef4444', label:'총 불량수량',
        value: a.totalDefectQty.toLocaleString()+'개',
        sub: top ? `최다 불량: ${top.type} (${top.count.toLocaleString()}개)` : '불량 없음',
        trendType: a.totalDefectQty > 0 ? 'up' : 'flat',
        trendVal: a.totalDefectQty > 0 ? '▲ 확인필요' : '— 양호' },
      { icon:'📉', color:'#f59e0b', label:'불량율(PPM)',
        value: a.avgPpm.toLocaleString(),
        sub: `검사수량 ${a.totalInspQty.toLocaleString()}개 기준`,
        trendType: a.avgPpm > 0 ? 'up' : 'flat',
        trendVal: a.avgPpm > 0 ? '▲ 관리필요' : '— 양호' },
      { icon:'💸', color:'#a855f7', label:'불량 금액',
        value: a.totalDefectAmt > 0 ? fmtWon(a.totalDefectAmt) : '—',
        sub: a.totalDefectAmt > 0 ? `${a.parts.length}개 품목 집계` : '금액 열 매핑을 확인하세요',
        trendType: a.totalDefectAmt > 0 ? 'up' : 'flat',
        trendVal: a.totalDefectAmt > 0 ? '— 실측값' : '— 미입력' },
    ];
  }

  // fallback: DB.lines 기반
  const lines    = DB.lines || [];
  const totalDef  = lines.reduce((s,l)=>s+(+l.defects||0), 0);
  const totalPrev = lines.reduce((s,l)=>s+(+l.prevDefects||0), 0);
  const totalRework = lines.reduce((s,l)=>s+(+l.rework||0), 0);
  const totalScrap  = lines.reduce((s,l)=>s+(+l.scrap||0), 0);
  const hasRework   = lines.some(l=>(+l.rework||0)>0 || (+l.scrap||0)>0);
  const diff = totalDef - totalPrev;
  return [
    { icon:'🔴', color:'#ef4444', label:'총 불량 수량',
      value: totalDef.toLocaleString()+'개',
      sub: totalPrev>0 ? `전주: ${totalPrev.toLocaleString()}개 대비 ${diff>0?'+':''}${diff}개` : '선별실적 파일을 업로드하세요',
      trendType: diff<0?'down':diff>0?'up':'flat',
      trendVal: diff!==0?(diff<0?'▼ ':'▲ ')+Math.abs(diff)+'개':'—' },
    { icon:'🔁', color:'#f59e0b', label:'재작업 수량',
      value: hasRework ? totalRework.toLocaleString()+'개' : '미입력',
      sub: hasRework ? `총 불량 대비 ${totalDef>0?(totalRework/totalDef*100).toFixed(1):'—'}%` : '선별실적 파일을 업로드하세요',
      trendType:'flat', trendVal: hasRework?'— 실측':'— 미입력' },
    { icon:'🗑️', color:'#ef4444', label:'폐기 수량',
      value: hasRework ? totalScrap.toLocaleString()+'개' : '미입력',
      sub: hasRework ? `폐기율: ${totalDef>0?(totalScrap/totalDef*100).toFixed(1):'—'}%` : '선별실적 파일을 업로드하세요',
      trendType: totalScrap>0?'up':'flat', trendVal: hasRework?(totalScrap>0?'▲ 확인필요':'— 없음'):'— 미입력' },
    (() => {
      const costs = calcFailureCosts();
      const grandTotal = costs.reduce((s,c) => s + c.total, 0);
      const hasCost = costs.some(c => c.total > 0);
      return { icon:'💰', color:'#a855f7', label:'불량 손실 비용',
        value: hasCost ? fmtWon(grandTotal) : '미입력',
        sub: hasCost ? `재작업+폐기+기타 비용 합계 (${costs.filter(c=>c.total>0).length}개 업체)` : '선별실적 파일을 업로드하세요',
        trendType: hasCost ? 'up' : 'flat', trendVal: hasCost ? '— 실측값' : '— 미입력' };
    })(),
  ];
}

function calcClaimKpi() {

// ─── 주간/월간 자동 집계 ───────────────────────────────────
function calcWeeklyTrendData() {
  const list = loadSessionList();
  if (!list.length) return { labels:[], defectQty:[], inspQty:[], ppm:[] };
  const sorted = [...list].sort((a,b)=>a.weekId>b.weekId?-1:1).slice(0,12).reverse();
  const labels=[], defectQty=[], inspQty=[], ppm=[];
  sorted.forEach(s=>{
    let dq=0, iq=0, pp=0;
    try {
      const raw=localStorage.getItem('qm_sess_sort_'+s.weekId);
      const sd=raw?JSON.parse(raw):null;
      if(sd&&sd.rows&&sd.rows.length){
        const a=buildSortAnalysis(sd); dq=a.totalDefectQty; iq=a.totalInspQty; pp=a.avgPpm;
      } else {
        const db=loadSessionData(s.weekId);
        if(db) dq=(db.lines||[]).reduce((acc,l)=>acc+(+l.defects||0),0);
      }
    } catch(e){}
    labels.push(s.label?s.label.replace(/\d{4}년\s*/,''):s.weekId);
    defectQty.push(dq); inspQty.push(iq); ppm.push(pp);
  });
  return {labels,defectQty,inspQty,ppm};
}

function calcWeeklyFcTrendData() {
  const list = loadSessionList();
  if (!list.length) return { labels:[], totalCost:[] };
  const sorted = [...list].sort((a,b)=>a.weekId>b.weekId?-1:1).slice(0,12).reverse();
  const labels=[], totalCost=[];
  sorted.forEach(s=>{
    let tc=0;
    try {
      const raw=localStorage.getItem('qm_sess_fc_'+s.weekId);
      const fd=raw?JSON.parse(raw):null;
      if(fd&&fd.rows&&fd.rows.length){ const a=buildFcAnalysis(fd); tc=a.grandTotalCost; }
    } catch(e){}
    labels.push(s.label?s.label.replace(/\d{4}년\s*/,''):s.weekId);
    totalCost.push(tc);
  });
  return {labels, totalCost};
}

function calcWeeklyHoldTrendData() {
  const list = loadSessionList();
  if (!list.length) return { labels:[], totalQty:[], waitQty:[], releaseQty:[] };
  const sorted = [...list].sort((a,b)=>a.weekId>b.weekId?-1:1).slice(0,12).reverse();
  const labels=[], totalQty=[], waitQty=[], releaseQty=[];
  sorted.forEach(s=>{
    let tq=0, wq=0, rq=0;
    try {
      const raw=localStorage.getItem('qm_sess_hold_'+s.weekId);
      const hd=raw?JSON.parse(raw):null;
      if(hd&&hd.rows&&hd.rows.length){ const a=buildHoldAnalysis(hd); tq=a.totalQty; wq=a.waitQty; rq=a.releaseQty; }
    } catch(e){}
    labels.push(s.label?s.label.replace(/\d{4}년\s*/,''):s.weekId);

function calcMonthlyTrendData() {
  const list = loadSessionList();
  if (!list.length) return { labels:[], defectQty:[], inspQty:[], ppm:[] };
  const byMonth = new Map();
  list.forEach(s=>{
    const key=`${s.year}-${String(s.month).padStart(2,'0')}`;
    if(!byMonth.has(key)) byMonth.set(key,{label:`${s.month}월`,dq:0,iq:0});
    const m=byMonth.get(key);
    try {
      const raw=localStorage.getItem('qm_sess_sort_'+s.weekId);
      const sd=raw?JSON.parse(raw):null;
      if(sd&&sd.rows&&sd.rows.length){
        const a=buildSortAnalysis(sd); m.dq+=a.totalDefectQty; m.iq+=a.totalInspQty;
      } else {
        const db=loadSessionData(s.weekId);
        if(db) m.dq+=(db.lines||[]).reduce((acc,l)=>acc+(+l.defects||0),0);
      }
    } catch(e){}
  });
  const entries=[...byMonth.entries()].sort(([a],[b])=>a>b?1:-1).slice(-12);
  const labels=[], defectQty=[], inspQty=[], ppm=[];
  entries.forEach(([,v])=>{
    labels.push(v.label);
    defectQty.push(v.dq); inspQty.push(v.iq);
    ppm.push(v.iq>0?Math.round(v.dq/v.iq*1000000):0);
  });
  return {labels,defectQty,inspQty,ppm};
}

function getPrevWeekData() {
  const list = loadSessionList().sort((a,b) => a.weekId > b.weekId ? -1 : 1);
  const curId = _currentSessionId || getWeekId(DB);
  const curIdx = curId ? list.findIndex(s => s.weekId === curId) : 0;
  if (curIdx < 0 || curIdx >= list.length - 1) return null;
  const prev = list[curIdx + 1];
  let ps = null, pf = null, ph = null;
  try { const r = localStorage.getItem('qm_sess_sort_' + prev.weekId); ps = r ? JSON.parse(r) : null; } catch(e) {}
  try { const r = localStorage.getItem('qm_sess_fc_'   + prev.weekId); pf = r ? JSON.parse(r) : null; } catch(e) {}
  try { const r = localStorage.getItem('qm_sess_hold_' + prev.weekId); ph = r ? JSON.parse(r) : null; } catch(e) {}
  return { sortData: ps, fcData: pf, holdData: ph, label: prev.label || prev.weekId };
}

function buildWeeklyAnalysisReport() {
  const prev     = getPrevWeekData();
  const curSort  = sortData && sortData.rows && sortData.rows.length  ? buildSortAnalysis(sortData)  : null;
  const curFc    = fcData   && fcData.rows   && fcData.rows.length    ? buildFcAnalysis(fcData)      : null;
  const curHold  = holdData && holdData.rows && holdData.rows.length  ? buildHoldAnalysis(holdData)  : null;
  const prevSort = prev && prev.sortData && prev.sortData.rows && prev.sortData.rows.length ? buildSortAnalysis(prev.sortData) : null;
  const prevFc   = prev && prev.fcData   && prev.fcData.rows   && prev.fcData.rows.length   ? buildFcAnalysis(prev.fcData)   : null;
  const prevHold = prev && prev.holdData && prev.holdData.rows && prev.holdData.rows.length ? buildHoldAnalysis(prev.holdData): null;
  if (!curSort && !curFc && !curHold) return '';

  const lines = [], tips = [];

  // ── 1. 불량율 (PPM) ──────────────────────────────────────
  if (curSort) {
    const cp = curSort.avgPpm;
    if (prevSort) {
      const pp = prevSort.avgPpm, d = cp - pp;
      const pctStr = pp > 0 ? ` (${d>0?'▲':'▼'}${(Math.abs(d)/pp*100).toFixed(1)}%)` : '';
      if (d > 0)      lines.push({t:'bad',  i:'🔴', msg:`불량율이 전주 ${pp.toLocaleString()} PPM → 이번주 ${cp.toLocaleString()} PPM으로 ${Math.abs(d).toLocaleString()} PPM 상승${pctStr}했습니다.`});
      else if (d < 0) lines.push({t:'good', i:'🟢', msg:`불량율이 전주 ${pp.toLocaleString()} PPM → 이번주 ${cp.toLocaleString()} PPM으로 ${Math.abs(d).toLocaleString()} PPM 감소${pctStr}했습니다.`});
      else            lines.push({t:'neu',  i:'⚪', msg:`불량율이 전주와 동일한 ${cp.toLocaleString()} PPM을 유지하고 있습니다.`});
    } else {
      lines.push({t:'info', i:'🔵', msg:`이번주 불량율: ${cp.toLocaleString()} PPM (불량 ${curSort.totalDefectQty.toLocaleString()}개 / 검사 ${curSort.totalInspQty.toLocaleString()}개)`});
    }
    if (curSort.defectTypeList.length) {
      const top3 = curSort.defectTypeList.slice(0,3).map(d=>`${d.type} ${d.count}개`).join(' · ');
      lines.push({t:'info', i:'📌', msg:`주요 불량 유형: ${top3}`});
      const t1 = curSort.defectTypeList[0];
      tips.push(`🔧 <strong>[불량 개선]</strong> <em>${esc(t1.type)}</em> 불량이 ${t1.count.toLocaleString()}개로 가장 많습니다. 해당 공정의 조건 점검 및 작업 표준 재교육을 권장합니다.`);
    }
    if (curSort.workplaces.length) {
      const tw = curSort.workplaces[0];
      const wpPct = curSort.totalDefectQty > 0 ? Math.round(tw.defectQty / curSort.totalDefectQty * 100) : 0;
      if (wpPct >= 25) tips.push(`🏭 <strong>[공정 집중관리]</strong> <em>${esc(tw.name)}</em> 공정이 전체 불량의 ${wpPct}%를 차지합니다. 해당 공정 우선 개선 활동을 권장합니다.`);
    }
  }

  // ── 2. 실패비용 ──────────────────────────────────────────
  if (curFc) {
    const cc = curFc.grandTotalCost;
    if (prevFc) {
      const pc = prevFc.grandTotalCost, d = cc - pc;
      if (d > 0)      lines.push({t:'bad',  i:'🔴', msg:`실패비용이 전주 ${fmtWon(pc)} → 이번주 ${fmtWon(cc)}로 ${fmtWon(d)} 증가했습니다.`});
      else if (d < 0) lines.push({t:'good', i:'🟢', msg:`실패비용이 전주 ${fmtWon(pc)} → 이번주 ${fmtWon(cc)}로 ${fmtWon(Math.abs(d))} 감소했습니다.`});
      else            lines.push({t:'neu',  i:'⚪', msg:`실패비용이 전주와 동일한 ${fmtWon(cc)}입니다.`});
    } else {
      lines.push({t:'info', i:'🔵', msg:`이번주 실패비용: ${fmtWon(cc)} (${curFc.parts.length}개 품번)`});
    }
    if (curFc.parts.length && curFc.parts[0].totalCost > 0) {
      const tp = curFc.parts[0];
      tips.push(`💰 <strong>[비용 절감]</strong> <em>${esc(tp.partNo || tp.partName || '품번미상')}</em> 품번의 실패비용이 ${fmtWon(tp.totalCost)}으로 최고입니다. 집중 관리가 필요합니다.`);
    }
  }

  // ── 3. Hold 현황 ──────────────────────────────────────────
  if (curHold) {
    if (prevHold) {
      const d = curHold.totalQty - prevHold.totalQty;
      if (d > 0) {
        lines.push({t:'bad',  i:'🔴', msg:`Hold 수량이 전주 ${prevHold.totalQty.toLocaleString()}개 → 이번주 ${curHold.totalQty.toLocaleString()}개로 ${d.toLocaleString()}개 증가했습니다.`});
        const prevByV = {}; prevHold.vendors.forEach(v => { prevByV[v.name] = v.qty; });
        const inc = curHold.vendors.map(v=>({name:v.name, diff:v.qty-(prevByV[v.name]||0)})).filter(v=>v.diff>0).sort((a,b)=>b.diff-a.diff).slice(0,3);
        if (inc.length) lines.push({t:'warn', i:'🟡', msg:`Hold 증가 주요 업체: ${inc.map(v=>`${v.name} (+${v.diff.toLocaleString()}개)`).join(' · ')}`});
      } else if (d < 0) {
        lines.push({t:'good', i:'🟢', msg:`Hold 수량이 전주 ${prevHold.totalQty.toLocaleString()}개 → 이번주 ${curHold.totalQty.toLocaleString()}개로 ${Math.abs(d).toLocaleString()}개 감소했습니다.`});
      } else {
        lines.push({t:'neu',  i:'⚪', msg:`Hold 수량이 전주와 동일한 ${curHold.totalQty.toLocaleString()}개입니다.`});
      }
    } else {
      lines.push({t:'info', i:'🔵', msg:`이번주 Hold: ${curHold.totalQty.toLocaleString()}개 (대기 ${curHold.waitQty.toLocaleString()}개 / 해제 ${curHold.releaseQty.toLocaleString()}개)`});
    }
    // Hold 대기 품번 상위 (rows에서 직접 집계)
    if (holdData && holdData.rows && holdData.colMap) {
      const cm = holdData.colMap, byPart = {};
      holdData.rows.forEach(row => {
        const pn = String(row[cm.partNo] || row[cm.partName] || '').trim() || '미상';
        const qty = parseMoney(row[cm.holdQty]) || 1;
        const st = String(row[cm.status] || '').trim();
        if (!byPart[pn]) byPart[pn] = { qty:0, wait:0 };
        byPart[pn].qty += qty;
        if (!['해제','폐기'].includes(st)) byPart[pn].wait += qty;
      });
      const topParts = Object.entries(byPart).filter(([,v])=>v.wait>0).sort((a,b)=>b[1].wait-a[1].wait).slice(0,3);
      if (topParts.length) tips.push(`🔒 <strong>[Hold 처리 우선순위]</strong> 대기 품번: ${topParts.map(([k,v])=>`<em>${esc(k)}</em> ${v.wait.toLocaleString()}개`).join(' · ')}. 신속한 원인 분석 및 처리가 필요합니다.`);
    }
  }

  // ── 4. 종합 의견 ──────────────────────────────────────────
  const badCnt = lines.filter(l=>l.t==='bad').length, goodCnt = lines.filter(l=>l.t==='good').length;
  if (badCnt === 0 && goodCnt > 0 && prev)
    tips.push(`✅ <strong>[종합 의견]</strong> 이번주 품질 지표가 전주 대비 전반적으로 개선되고 있습니다. 현재 관리 수준 유지 및 지속적인 모니터링을 권장합니다.`);
  else if (badCnt >= 2)
    tips.push(`⚠️ <strong>[종합 의견]</strong> 이번주 복수의 품질 지표가 악화되었습니다. 근본 원인 분석(5-Why) 및 즉각적인 개선 대책 수립이 필요합니다.`);

  // ── HTML 렌더링 ───────────────────────────────────────────
  const colMap2 = { bad:'#fca5a5', good:'#86efac', warn:'#fde68a', neu:'var(--text-muted)', info:'var(--text-primary)' };
  const bgMap2  = { bad:'rgba(239,68,68,.09)', good:'rgba(34,197,94,.09)', warn:'rgba(245,158,11,.09)', neu:'transparent', info:'transparent' };
  const linesHtml = lines.map(l=>`
    <div style="display:flex;gap:10px;align-items:flex-start;padding:8px 10px;margin-bottom:3px;background:${bgMap2[l.t]||'transparent'};border-radius:8px">
      <span style="font-size:1rem;flex-shrink:0;line-height:1.55">${l.i}</span>
      <span style="font-size:.85rem;color:${colMap2[l.t]||'var(--text-primary)'};line-height:1.55">${l.msg}</span>
    </div>`).join('');
  const tipsHtml = tips.length ? `
    <div style="margin-top:14px;padding:14px 16px;background:rgba(37,99,235,.07);border:1px solid rgba(37,99,235,.18);border-radius:12px">
      <div style="font-size:.74rem;font-weight:700;color:#60a5fa;letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px">💡 개선 제안</div>
      ${tips.map(t=>`<div style="font-size:.83rem;color:var(--text-dim);padding:5px 0;line-height:1.6;border-bottom:1px solid rgba(255,255,255,.04)">${t}</div>`).join('')}
    </div>` : '';
  const prevLabel = prev ? `전주(${(prev.label||'').replace(/\d{4}년\s*/,'')}) 대비 분석` : '이번주 분석 요약';
  return `
  <div class="card" style="margin-top:16px">
    <div class="card-hdr">
      <span class="card-title">📋 주간 품질 분석 리포트</span>
      <span class="cb">${prevLabel}</span>
    </div>
    <div style="padding:6px 0">
      ${linesHtml}
      ${tipsHtml}
    </div>
  </div>`;
}

function editMeeting() {
  openModal('회의 정보 편집', SCHEMA.meeting, DB.meeting, result => {
    Object.assign(DB.meeting, result);
    document.getElementById('weekBadge').textContent = DB.meeting.week;
    saveData(); refresh();
  });
}
function editTrendData() {
  const flat = {};
  DB.trendData.labels.forEach((l,i)=>{ flat[`label${i}`]=l; flat[`val${i}`]=DB.trendData.values[i]; });
  flat.target = DB.trendData.target;
  openModal('불량률 추이 데이터 편집', SCHEMA.trendData, flat, result => {
    DB.trendData.labels = [0,1,2,3,4,5,6,7].map(i=>result[`label${i}`]||`W${i+1}`);
    DB.trendData.values = [0,1,2,3,4,5,6,7].map(i=>parseFloat(result[`val${i}`])||0);
    DB.trendData.target = parseFloat(result.target)||0.5;
    saveData(); refresh();
  });
}
function editLine(id) {
  const rec = DB.lines.find(x=>x.id===id);
  openModal('업체 편집', SCHEMA.line, rec, result => {
    Object.assign(rec, result);
    saveData(); refresh();
  });
}
function addLine() {
  openModal('업체 추가', SCHEMA.line, {produced:0,defects:0,prevDefects:0,target:0.5}, result => {
    result.id = ++nextId;
    DB.lines.push(result);
    saveData(); refresh();
  });
}
function editDefectDist(id) {

    Object.assign(rec, result);

  });
