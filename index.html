<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a2744">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="/manifest.json">
<title>품질 주간 회의</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0a0e1a;--bg-card:#111827;--bg-nav:#0d1422;
  --border:#1e2d4a;--border2:rgba(30,45,74,.5);
  --text-primary:#f1f5f9;--text-muted:#94a3b8;--text-dim:#64748b;
  --accent-blue:#2563eb;--accent-cyan:#06b6d4;--accent-gold:#f59e0b;
  --accent-red:#ef4444;--accent-green:#22c55e;--accent-purple:#a855f7;
  --shadow:0 8px 32px rgba(0,0,0,.4);
  --nav-h:64px;--tab-h:52px;
}
body.light{
  --bg-primary:#f0f4f8;--bg-card:#ffffff;--bg-nav:#e8edf5;
  --border:#dde3ed;--border2:rgba(200,210,230,.6);
  --text-primary:#0f172a;--text-muted:#475569;--text-dim:#94a3b8;
  --shadow:0 8px 32px rgba(0,0,0,.1);
}
html{font-size:14px}
body{background:var(--bg-primary);color:var(--text-primary);font-family:'Segoe UI',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);
  background:linear-gradient(135deg,#0d1b3e,#162040);
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  box-shadow:0 4px 24px rgba(0,0,0,.5)}
.h-left{display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent-blue),var(--accent-cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;color:#fff;box-shadow:0 0 16px rgba(37,99,235,.5)}
.h-titles h1{font-size:1.1rem;font-weight:700;color:#f1f5f9}
.h-titles p{font-size:.7rem;color:var(--accent-cyan);letter-spacing:1px}
.h-right{display:flex;align-items:center;gap:8px}
.week-badge{background:rgba(37,99,235,.2);border:1px solid rgba(37,99,235,.4);
  border-radius:20px;padding:4px 14px;font-size:.78rem;color:var(--accent-cyan);font-weight:600}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);color:#fff;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:hover{background:rgba(255,255,255,.18)}

/* NAV TABS */
.nav-tabs{position:fixed;top:var(--nav-h);left:0;right:0;z-index:99;height:var(--tab-h);
  background:var(--bg-nav);border-bottom:1px solid var(--border);
  display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;padding:0 8px;gap:4px;
  transition:background .3s}
.nav-tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;height:36px;padding:0 16px;border:1px solid transparent;border-radius:8px;
  background:transparent;color:var(--text-muted);font-size:.8rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:var(--text-primary);background:rgba(128,128,128,.08)}
.tab-btn.active{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.4);color:var(--accent-cyan)}
.tab-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.7}
.font-ctrl{display:flex;align-items:center;gap:4px;margin-left:auto;padding-right:6px;flex-shrink:0}
.font-btn{height:28px;min-width:28px;padding:0 7px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;font-weight:700;transition:all .2s;white-space:nowrap}
.font-btn:hover{background:rgba(128,128,128,.1);color:var(--text-primary)}
.font-btn.active-size{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.4);color:var(--accent-cyan)}
.font-size-input{height:28px;width:58px;padding:0 6px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);text-align:center;font-size:.72rem;font-weight:700;outline:none}
.font-size-input:focus{border-color:rgba(37,99,235,.45);color:var(--text-primary)}
.font-size-input::-webkit-outer-spin-button,.font-size-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.font-size-input[type=number]{-moz-appearance:textfield}

/* MAIN */
main{margin-top:calc(var(--nav-h) + var(--tab-h));padding:20px;max-width:1400px;margin-left:auto;margin-right:auto}
.section{display:none}
.section.active{display:block}

/* PAGE HEADER */
.page-hdr{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.page-hdr h2{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:8px}
.page-hdr h2::before{content:'';display:inline-block;width:4px;height:22px;border-radius:2px;
  background:linear-gradient(var(--accent-blue),var(--accent-cyan))}
.hdr-actions{display:flex;gap:8px;align-items:center}

/* GRID */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr}main{padding:14px}}

/* KPI CARD */
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px;
  position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--accent-blue))}
.kpi-icon{font-size:1.8rem;margin-bottom:8px}
.kpi-lbl{font-size:.73rem;color:var(--text-muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-size:2rem;font-weight:800;line-height:1;margin-bottom:6px;color:var(--kc,var(--accent-blue))}
.kpi-sub{font-size:.73rem;color:var(--text-muted)}
.kpi-trend{position:absolute;top:14px;right:14px;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px}
.kpi-edit-btn{position:absolute;bottom:12px;right:12px;width:22px;height:22px;border-radius:5px;
  background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text-dim);
  font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.kpi-edit-btn:hover{background:rgba(37,99,235,.2);color:var(--accent-cyan);border-color:rgba(37,99,235,.4)}
.trend-up{background:rgba(239,68,68,.15);color:#f87171}
.trend-down{background:rgba(34,197,94,.15);color:#4ade80}
.trend-flat{background:rgba(148,163,184,.1);color:var(--text-muted)}

/* CARD */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;transition:background .3s,border .3s}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card-title{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:8px}
.cb{font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(37,99,235,.15);color:var(--accent-cyan)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.tbl th{background:rgba(128,128,128,.06);color:var(--text-muted);font-weight:700;font-size:.7rem;letter-spacing:.5px;text-transform:uppercase;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border2);color:var(--text-primary);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(128,128,128,.03)}
.tbl-nowrap th,.tbl-nowrap td{white-space:nowrap;word-break:keep-all}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap}
.b-red{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.b-yellow{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.b-green{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.b-blue{background:rgba(37,99,235,.15);color:#60a5fa;border:1px solid rgba(37,99,235,.3)}
.b-purple{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.b-gray{background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid rgba(100,116,139,.3)}

/* PROGRESS */
.prg-wrap{background:rgba(128,128,128,.12);border-radius:6px;height:7px;overflow:hidden;flex:1}
.prg-bar{height:100%;border-radius:6px;transition:width .5s ease}

/* ALERTS */
.alert{border-radius:10px;padding:13px 16px;border-left:4px solid;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.alert.red{background:rgba(239,68,68,.07);border-color:var(--accent-red)}
.alert.yellow{background:rgba(245,158,11,.07);border-color:var(--accent-gold)}
.alert.green{background:rgba(34,197,94,.07);border-color:var(--accent-green)}
.alert.blue{background:rgba(37,99,235,.07);border-color:var(--accent-blue)}
.alert-icon{font-size:1.2rem;margin-top:1px}
.alert-body h4{font-size:.84rem;font-weight:700;margin-bottom:3px}
.alert-body p{font-size:.77rem;color:var(--text-muted);line-height:1.55}

/* STAT ROW */
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2)}
.srow:last-child{border-bottom:none}
.srow .sl{font-size:.81rem;color:var(--text-muted)}.srow .sv{font-size:.88rem;font-weight:700}

/* TIMELINE */
.tl{position:relative;padding-left:26px}
.tl::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:18px}
.tl-item::before{content:'';position:absolute;left:-23px;top:5px;width:11px;height:11px;border-radius:50%;background:var(--accent-blue);border:2px solid var(--bg-primary);box-shadow:0 0 8px rgba(37,99,235,.5)}
.tl-item.done::before{background:var(--accent-green);box-shadow:0 0 8px rgba(34,197,94,.5)}
.tl-item.issue::before{background:var(--accent-red);box-shadow:0 0 8px rgba(239,68,68,.5)}
.tl-date{font-size:.7rem;color:var(--text-dim);margin-bottom:2px}
.tl-title{font-size:.87rem;font-weight:700;margin-bottom:3px}
.tl-desc{font-size:.77rem;color:var(--text-muted);line-height:1.5}

/* MEETING INFO BAR */
.meeting-bar{background:linear-gradient(135deg,rgba(37,99,235,.1),rgba(6,182,212,.1));border:1px solid rgba(37,99,235,.25);border-radius:12px;padding:14px 20px;display:flex;gap:28px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.mbi{display:flex;flex-direction:column;gap:3px}
.mbi .ml{font-size:.67rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.mbi .mv{font-size:.87rem;font-weight:700}

/* M ICONS */
.mi{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;font-size:.7rem;font-weight:800;margin-right:3px}
.mi-man{background:rgba(168,85,247,.2);color:#c084fc}
.mi-machine{background:rgba(37,99,235,.2);color:#60a5fa}
.mi-material{background:rgba(245,158,11,.2);color:#fbbf24}
.mi-method{background:rgba(34,197,94,.2);color:#4ade80}

/* CHART */
.chart-wrap{position:relative;height:240px}

/* ACTION BUTTONS */
.btn-add{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#4ade80;font-size:.77rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-add:hover{background:rgba(34,197,94,.22)}
.btn-edit{display:inline-flex;align-items:center;justify-content:center;width:25px;height:25px;border-radius:6px;background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.28);color:#60a5fa;cursor:pointer;font-size:.72rem;transition:all .15s}
.btn-edit:hover{background:rgba(37,99,235,.28)}
.btn-edit-text{width:auto;height:30px;padding:0 12px;font-size:.76rem;font-weight:700;gap:4px;white-space:nowrap}
.btn-del{display:inline-flex;align-items:center;justify-content:center;width:25px;height:25px;border-radius:6px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171;cursor:pointer;font-size:.72rem;transition:all .15s}
.btn-del:hover{background:rgba(239,68,68,.25)}
.btn-print{background:rgba(37,99,235,.15);border:1px solid rgba(37,99,235,.35);color:var(--accent-cyan);border-radius:8px;padding:6px 14px;font-size:.77rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-print:hover{background:rgba(37,99,235,.3)}
.btn-new{display:flex;align-items:center;gap:5px;padding:0 14px;height:34px;border-radius:8px;border:1px solid rgba(34,197,94,.5);background:rgba(34,197,94,.15);color:#4ade80;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
.btn-new:hover{background:rgba(34,197,94,.3)}
.reset-opt{display:flex;flex-direction:column;gap:10px;padding:4px 0}
.reset-opt-btn{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text-primary);cursor:pointer;text-align:left;transition:all .2s;width:100%}
.reset-opt-btn:hover{background:rgba(128,128,128,.08);border-color:rgba(128,128,128,.3)}
.reset-opt-btn.danger:hover{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.35)}
.reset-opt-icon{font-size:1.5rem;flex-shrink:0;margin-top:1px}
.reset-opt-body h4{font-size:.88rem;font-weight:700;margin-bottom:3px}
.reset-opt-body p{font-size:.77rem;color:var(--text-muted);line-height:1.4}
/* IMPORT HIDDEN INPUT */
#importFile{display:none}
.btn-sec{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#fbbf24;border-radius:8px;padding:6px 13px;font-size:.77rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-sec:hover{background:rgba(245,158,11,.22)}
.act-cell{display:flex;gap:5px;align-items:center}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:min(560px,95vw);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.5);transform:scale(.95);transition:transform .2s,background .3s}
.modal-overlay.open .modal-box{transform:scale(1)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.modal-hdr h3{font-size:.98rem;font-weight:700}
.modal-x{width:28px;height:28px;border-radius:6px;background:rgba(128,128,128,.1);border:none;color:var(--text-muted);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-x:hover{background:rgba(239,68,68,.15);color:#f87171}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-ftr{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.frow{margin-bottom:13px}
.flbl{display:block;font-size:.72rem;font-weight:700;color:var(--text-muted);margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}
.finp{width:100%;background:rgba(128,128,128,.06);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text-primary);font-size:.87rem;font-family:inherit;transition:border-color .2s}
.finp:focus{outline:none;border-color:var(--accent-blue)}
textarea.finp{min-height:70px;resize:vertical}
select.finp option{background:#1a2135;color:var(--text-primary)}
body.light .finp{background:#f8fafc;border-color:#d1d9e6;color:#0f172a}
body.light select.finp option{background:#fff;color:#0f172a}
.btn-cancel{background:rgba(128,128,128,.1);border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:8px 18px;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-cancel:hover{background:rgba(128,128,128,.2);color:var(--text-primary)}
.btn-save{background:var(--accent-blue);border:none;color:#fff;border-radius:8px;padding:8px 24px;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-save:hover{background:#1d4ed8}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.form-2col{grid-template-columns:1fr}}

/* DONUT LEGEND */
.dl{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.dl-item{display:flex;align-items:center;gap:8px;font-size:.8rem}
.dl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.dl-pct{margin-left:auto;font-weight:700}

/* SPACER */
.sp{margin-bottom:14px}

/* PRINT */
@media print{header,.nav-tabs{display:none}main{margin-top:0!important}.section{display:block!important}.card{break-inside:avoid}}

/* FC DROP ZONE */
.fc-drop-zone{border:2px dashed var(--border);border-radius:14px;padding:36px 20px;cursor:pointer;transition:all .25s;max-width:440px;margin:0 auto;text-align:center}
.fc-drop-zone:hover,.fc-drop-zone.drag-over{border-color:var(--accent-blue);background:rgba(37,99,235,.07)}
.fc-drop-zone p{color:var(--text-muted);margin-top:8px;font-size:.88rem}
.fc-view-btn{height:30px;padding:0 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.fc-view-btn:hover{background:rgba(128,128,128,.1);color:var(--text-primary)}
.fc-view-btn.active-view{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.4);color:var(--accent-cyan)}
</style>
</head>
<body>

<header>
  <div class="h-left">
    <div class="logo">Q</div>
    <div class="h-titles">
      <h1>품질 주간 회의</h1>
      <p>AUTOMOTIVE PLASTIC PARTS · QUALITY MANAGEMENT</p>
    </div>
  </div>
  <div class="h-right">
    <span class="week-badge" id="weekBadge"></span>
    <button class="btn-new" onclick="openNewMeetingDialog()">＋ 새 회의 시작</button>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="테마 변경">🌙</button>
    <button class="icon-btn" onclick="exportData()" title="데이터 내보내기">💾</button>
    <button class="icon-btn" onclick="openImportFile()" title="JSON 불러오기">📂</button>
    <button class="icon-btn" onclick="window.print()" title="인쇄">🖨</button>
    <input type="file" id="importFile" accept=".json" onchange="importData(event)">
  </div>
</header>

<nav class="nav-tabs">
  <button class="tab-btn active" onclick="showTab('dashboard')" data-tab="dashboard"><span class="tab-dot"></span>종합 현황</button>
  <button class="tab-btn" onclick="showTab('defect')" data-tab="defect"><span class="tab-dot"></span>불량 현황</button>
  <button class="tab-btn" onclick="showTab('claim')" data-tab="claim"><span class="tab-dot"></span>고객 클레임</button>

function loadData() {
  try {
    const saved = localStorage.getItem('qm_data');
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULTS));
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULTS)); }
}
function saveData() {
  localStorage.setItem('qm_data', JSON.stringify(DB));
}
function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `quality_data_${DB.meeting.week.replace(/[^0-9]/g,'')}.json`;
  a.click();
}

  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const parsed = JSON.parse(evt.target.result);
      if (!parsed.meeting) throw new Error('형식 오류');
      DB = parsed;
      saveData(); refresh();
      alert('데이터를 성공적으로 불러왔습니다.');

  };
  reader.readAsText(file);

function trendArrow(t) {
  return t==='up'?'<span style="color:#f87171">▲</span>':t==='down'?'<span style="color:#4ade80">▼</span>':'<span style="color:#94a3b8">—</span>';
}

function defRate(line) {
  return line.produced ? (line.defects / line.produced * 100) : 0;
}
function lineStatus(line) {
  const r = defRate(line);
  if (r > line.target * 1.1) return '불량';
  if (r > line.target * 0.9) return '주의';
  return '정상';
}
function prgColor(p) {
  if (p >= 100) return '#22c55e';
  if (p >= 70) return '#2563eb';
  if (p >= 40) return '#f59e0b';
  return '#ef4444';
}
function mIcon(type) {
  const map = {Man:['인','mi-man'],Machine:['기','mi-machine'],Material:['재','mi-material'],Method:['법','mi-method']};
  const [l,c] = map[type]||['?','mi-man'];
  return `<span class="mi ${c}">${l}</span>`;
}

function getWeekNum(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
  const y = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-y)/86400000)+1)/7);
}

let _modalSave = null;

function openModal(title, schema, record, onSave) {
  document.getElementById('modalTitle').textContent = title;
  const form = document.getElementById('modalForm');
  form.innerHTML = schema.map(f => {
    const v = record ? (record[f.k] ?? '') : '';
    let input = '';
    if (f.t === 'partslist') {
      input = `<input type="text" class="finp" data-key="${f.k}" value="${esc(v)}" list="partsList" placeholder="품번 검색 또는 직접 입력…" autocomplete="off">`;
    } else if (f.t === 'select') {
      input = `<select class="finp" data-key="${f.k}">${f.opts.map(o=>`<option value="${esc(o)}"${o==v?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
    } else if (f.t === 'textarea') {
      input = `<textarea class="finp" data-key="${f.k}" rows="3">${esc(v)}</textarea>`;
    } else if (f.t === 'color') {
      input = `<div style="display:flex;gap:8px;align-items:center"><input type="color" class="finp" data-key="${f.k}" value="${esc(v)||'#2563eb'}" style="width:48px;height:36px;padding:2px;cursor:pointer"><input type="text" class="finp" data-key="${f.k}_txt" value="${esc(v)}" style="flex:1" oninput="document.querySelector('[data-key=${f.k}]').value=this.value"></div>`;
    } else {
      input = `<input type="${f.t}" class="finp" data-key="${f.k}" value="${esc(v)}">`;
    }
    return `<div class="frow"><label class="flbl">${esc(f.l)}</label>${input}</div>`;
  }).join('');

  // sync color text→picker
  form.querySelectorAll('input[type=color]').forEach(el => {
    el.addEventListener('input', () => {
      const txt = form.querySelector(`[data-key="${el.dataset.key}_txt"]`);
      if (txt) txt.value = el.value;
    });
  });

  _modalSave = () => {
    const result = {};
    schema.forEach(f => {
      const el = form.querySelector(`[data-key="${f.k}"]`);
      if (!el) return;
      result[f.k] = f.t === 'number' ? parseFloat(el.value)||0 : el.value;
    });
    onSave(result);
    closeModal();
  };
  document.getElementById('modalSave').onclick = _modalSave;
  document.getElementById('modal').classList.add('open');
  setTimeout(() => form.querySelector('.finp')?.focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalSave').style.display = '';
}

// ═══════════════════════════════════════════════
// RENDER — DASHBOARD
// ═══════════════════════════════════════════════
function calcDashboardKpi() {
  const lines = DB.lines || [];
  const totalProd = lines.reduce((s,l) => s + (+l.produced||0), 0);
  const totalDef  = lines.reduce((s,l) => s + (+l.defects||0), 0);
  const totalPrev = lines.reduce((s,l) => s + (+l.prevDefects||0), 0);
  const hasData   = totalProd > 0;

  const currRate  = hasData ? totalDef / totalProd * 100 : null;
  const prevRate  = hasData && totalPrev > 0 ? totalPrev / totalProd * 100 : null;
  const avgTarget = lines.length > 0 ? lines.reduce((s,l)=>s+(+l.target||0),0)/lines.length : 0.5;

  const diff      = (currRate !== null && prevRate !== null) ? Math.abs(currRate - prevRate).toFixed(2) : null;
  const improved  = diff !== null && currRate < prevRate;
  const worsened  = diff !== null && currRate > prevRate;
  const defTrend  = improved ? 'down' : worsened ? 'up' : 'flat';

  const activeClaims = (DB.claims||[]).filter(c => c.status !== '완결').length;
  const newClaims    = (DB.claims||[]).filter(c => c.status === '신규').length;
  const carryOver    = (DB.claims||[]).filter(c => c.status === '진행중').length;
  const urgentCount  = (DB.issues||[]).filter(x => x.priority === '긴급').length;

  return [
    {
      icon: DB.kpi[0]?.icon||'📊', color: DB.kpi[0]?.color||'#2563eb',
      label: '주간 종합 불량률',
      value: currRate !== null ? currRate.toFixed(2)+'%' : '—',
      sub: hasData ? `목표: ${avgTarget.toFixed(2)}% 이하 / 전주 대비 ${diff!==null?(improved?'▼ ':'▲ ')+diff+'%p':'—'}` : '업체별 현황 탭에 데이터를 입력하세요',
      trendType: defTrend,
      trendVal: diff !== null ? (improved?'▼ ':'▲ ')+diff+'%p' : '—',
    },
    {
      icon: DB.kpi[1]?.icon||'🏭', color: DB.kpi[1]?.color||'#22c55e',
      label: '공정 수율',
      value: currRate !== null ? (100-currRate).toFixed(2)+'%' : '—',
      sub: hasData ? `목표: ${(100-avgTarget).toFixed(2)}% 이상` : '업체별 현황 탭에 데이터를 입력하세요',
      trendType: improved ? 'down' : worsened ? 'up' : 'flat',
      trendVal: diff !== null ? (improved?'▲ ':'▼ ')+diff+'%p' : '—',
    },
    {
      icon: DB.kpi[2]?.icon||'🚗', color: DB.kpi[2]?.color||'#f59e0b',
      label: '고객 클레임',
      value: activeClaims + '건',
      sub: `이월: ${carryOver}건 / 신규: ${newClaims}건`,
      trendType: activeClaims === 0 ? 'flat' : 'up',
      trendVal: activeClaims === 0 ? '— 없음' : `진행중 ${activeClaims}건`,
    },
    {
      icon: DB.kpi[3]?.icon||'⚠️', color: DB.kpi[3]?.color||'#ef4444',
      label: '긴급 이슈',
      value: urgentCount + '건',
      sub: urgentCount > 0 ? '즉각 대응 필요' : '현재 없음',
      trendType: urgentCount > 0 ? 'up' : 'flat',
      trendVal: urgentCount > 0 ? '▲ 조치중' : '— 정상',
    },
  ];
}

function calcFailureCosts() {
  return (DB.lines || []).map(l => {
    const rework     = +l.rework     || 0;
    const scrap      = +l.scrap      || 0;
    const reworkCost = rework * (+l.reworkCostUnit || 0);
    const scrapCost  = scrap  * (+l.scrapCostUnit  || 0);
    const extra      = +l.extraCost  || 0;
    const total      = reworkCost + scrapCost + extra;
    return { id: l.id, name: l.name, product: l.product,
             rework, scrap, reworkCost, scrapCost, extra, total };
  }).sort((a, b) => b.total - a.total);
}

function fmtWon(n) {
  return '₩' + Math.round(n).toLocaleString('ko-KR');
}

function calcDefectKpi() {
  const lines    = DB.lines || [];
  const totalDef  = lines.reduce((s,l)=>s+(+l.defects||0), 0);
  const totalPrev = lines.reduce((s,l)=>s+(+l.prevDefects||0), 0);
  const totalRework = lines.reduce((s,l)=>s+(+l.rework||0), 0);
  const totalScrap  = lines.reduce((s,l)=>s+(+l.scrap||0), 0);
  const hasRework   = lines.some(l=>(+l.rework||0)>0 || (+l.scrap||0)>0);
  const diff = totalDef - totalPrev;
  return [
    { icon:'🔴', color:'#ef4444', label:'총 불량 수량',
      value: totalDef.toLocaleString()+'개',
      sub: totalPrev>0 ? `전주: ${totalPrev.toLocaleString()}개 대비 ${diff>0?'+':''}${diff}개` : '전주 불량수량을 입력하세요',
      trendType: diff<0?'down':diff>0?'up':'flat',
      trendVal: diff!==0?(diff<0?'▼ ':'▲ ')+Math.abs(diff)+'개':'—' },
    { icon:'🔁', color:'#f59e0b', label:'재작업 수량',
      value: hasRework ? totalRework.toLocaleString()+'개' : '미입력',
      sub: hasRework
        ? `총 불량 대비 ${totalDef>0?(totalRework/totalDef*100).toFixed(1):'—'}%`
        : '업체별 현황 → ✏ 버튼에서 입력',
      trendType:'flat', trendVal: hasRework?'— 실측':'— 미입력' },
    { icon:'🗑️', color:'#ef4444', label:'폐기 수량',
      value: hasRework ? totalScrap.toLocaleString()+'개' : '미입력',
      sub: hasRework
        ? `폐기율: ${totalDef>0?(totalScrap/totalDef*100).toFixed(1):'—'}%`
        : '업체별 현황 → ✏ 버튼에서 입력',
      trendType: totalScrap>0?'up':'flat',
      trendVal: hasRework?(totalScrap>0?'▲ 확인필요':'— 없음'):'— 미입력' },
    (() => {
      const costs = calcFailureCosts();
      const grandTotal = costs.reduce((s,c) => s + c.total, 0);
      const hasCost = costs.some(c => c.total > 0);
      return { icon:'💰', color:'#a855f7', label:'불량 손실 비용',
        value: hasCost ? fmtWon(grandTotal) : '미입력',
        sub: hasCost
          ? `재작업+폐기+기타 비용 합계 (${costs.filter(c=>c.total>0).length}개 업체)`
          : '업체별 현황 ✏ 에서 비용 단가를 입력하세요',
        trendType: hasCost ? 'up' : 'flat',
        trendVal: hasCost ? '— 실측값' : '— 미입력' };
    })(),
  ];
}

function calcClaimKpi() {
  const cl = DB.claims || [];
  const active   = cl.filter(c=>c.status!=='완결').length;
  const newOnes  = cl.filter(c=>c.status==='신규').length;
  const carry    = cl.filter(c=>c.status==='진행중').length;
  const done     = cl.filter(c=>c.status==='완결').length;
  const total    = cl.length;
  return [
    { icon:'📌', color:'#ef4444', label:'진행중 클레임',
      value: active+'건', sub:`이월: ${carry}건 / 신규: ${newOnes}건`,
      trendType: active===0?'flat':'up', trendVal: active===0?'— 없음':'▲ 대응중' },
    { icon:'✅', color:'#22c55e', label:'완결 클레임',
      value: done+'건', sub:'누적 완결 처리',
      trendType:'down', trendVal: done>0?'▼ 완결':'—' },
    { icon:'📅', color:'#f59e0b', label:'누적 클레임',
      value: total+'건', sub:`완결률: ${total>0?(done/total*100).toFixed(0):'—'}%`,
      trendType: total===0?'flat':'flat', trendVal: total===0?'— 없음':`처리율 ${total>0?(done/total*100).toFixed(0):'0'}%` },
  ];
}

function calcFourMKpi() {
  const fm = DB.fourm || [];
  const total    = fm.length;
  const approved = fm.filter(f=>f.approval==='승인').length;
  const pending  = fm.filter(f=>f.approval==='보류'||f.verify==='검증 진행중'||f.verify==='초물 검사 대기').length;
  const stopped  = fm.filter(f=>f.verify==='검증 중단').length;
  return [
    { icon:'📋', color:'#2563eb', label:'이번주 등록',
      value: total+'건', sub:'신규 등록 변경점',
      trendType:'flat', trendVal: total>0?`총 ${total}건`:'—' },
    { icon:'✅', color:'#22c55e', label:'검증 완료',
      value: approved+'건', sub:`전체 중 ${total>0?(approved/total*100).toFixed(0):'—'}%`,
      trendType: approved>0?'down':'flat', trendVal: approved>0?'▼ 양호':'—' },
    { icon:'⚠️', color:'#f59e0b', label:'검증 미완료',
      value: pending+'건', sub:'출하 전 확인 필요',
      trendType: pending>0?'up':'flat', trendVal: pending>0?'▲ 주의':'— 없음' },
    { icon:'🚫', color:'#ef4444', label:'중단/보류',
      value: stopped+'건', sub: stopped>0?'즉각 조치 필요':'이상 없음',
      trendType: stopped>0?'up':'flat', trendVal: stopped>0?'▲ 조치중':'— 정상' },
  ];
}

function calcImproveKpi() {
  const ip = DB.improvements || [];
  const inProgress = ip.filter(x=>x.status==='진행중'||x.status==='거의 완료').length;
  const done       = ip.filter(x=>x.status==='완료').length;
  const delayed    = ip.filter(x=>x.status==='지연').length;
  return [
    { icon:'🎯', color:'#22c55e', label:'진행중 과제',
      value: inProgress+'건', sub:`전체 ${ip.length}건 중`,
      trendType:'flat', trendVal: inProgress>0?`${inProgress}건 진행`:'—' },
    { icon:'✅', color:'#2563eb', label:'완료 과제',
      value: done+'건', sub:`완료율: ${ip.length>0?(done/ip.length*100).toFixed(0):'—'}%`,
      trendType: done>0?'down':'flat', trendVal: done>0?'▼ 완료':'—' },
    { icon:'⏰', color:'#f59e0b', label:'지연 과제',
      value: delayed+'건', sub: delayed>0?'D/L 초과 — 만회 필요':'지연 없음',
      trendType: delayed>0?'up':'flat', trendVal: delayed>0?'▲ 주의':'— 정상' },
  ];
}

function editTrendData() {
  const flat = {};
  DB.trendData.labels.forEach((l,i)=>{ flat[`label${i}`]=l; flat[`val${i}`]=DB.trendData.values[i]; });
  flat.target = DB.trendData.target;
  openModal('불량률 추이 데이터 편집', SCHEMA.trendData, flat, result => {
    DB.trendData.labels = [0,1,2,3,4,5,6,7].map(i=>result[`label${i}`]||`W${i+1}`);
    DB.trendData.values = [0,1,2,3,4,5,6,7].map(i=>parseFloat(result[`val${i}`])||0);
    DB.trendData.target = parseFloat(result.target)||0.5;
    saveData(); refresh();
  });
}

// 4M 등록 데이터 → 월별 자동 집계
function calcFourMMonthlyAuto() {
  const fm = DB.fourm || [];
  const monthMap = {}; // 'YYYY-MM' -> {Man,Machine,Material,Method}

  fm.forEach(f => {
    if (!f.date) return;
    const d = String(f.date).trim();
    const m = d.match(/(\d{4})[.\-\/](\d{1,2})/);
    if (!m) return;
    const key = `${m[1]}-${String(m[2]).padStart(2,'0')}`;
    if (!monthMap[key]) monthMap[key] = {Man:0,Machine:0,Material:0,Method:0};
    const t = f.type;
    if (monthMap[key][t] !== undefined) monthMap[key][t]++;
  });

  // 데이터가 없으면 현재 연도 1~12월 빈 데이터 반환
  if (!Object.keys(monthMap).length) {
    const yr = new Date().getFullYear();
    const labels = Array.from({length:12},(_,i)=>`${yr}-${String(i+1).padStart(2,'0')}`);
    return { labels, man:labels.map(()=>0), machine:labels.map(()=>0), material:labels.map(()=>0), method:labels.map(()=>0) };
  }

  const labels = Object.keys(monthMap).sort();
  return {
    labels,
    man:      labels.map(k => monthMap[k].Man      || 0),
    machine:  labels.map(k => monthMap[k].Machine  || 0),
    material: labels.map(k => monthMap[k].Material || 0),
    method:   labels.map(k => monthMap[k].Method   || 0),
  };
}

function renderFourMAutoTable() {
  const auto = calcFourMMonthlyAuto();
  if (auto.labels.every((_, i) => auto.man[i]+auto.machine[i]+auto.material[i]+auto.method[i] === 0)) {
    return `<div style="text-align:center;padding:18px;color:var(--text-dim);font-size:.82rem">4M 변경점을 등록하면 자동으로 집계됩니다.</div>`;
  }
  const types = [
    {key:'man',      label:'Man',      color:'#a855f7'},
    {key:'machine',  label:'Machine',  color:'#2563eb'},
    {key:'material', label:'Material', color:'#f59e0b'},
    {key:'method',   label:'Method',   color:'#22c55e'},
  ];
  const totals = auto.labels.map((_,i) => auto.man[i]+auto.machine[i]+auto.material[i]+auto.method[i]);
  const grandTotal = totals.reduce((s,v)=>s+v,0);
  const thead = auto.labels.map(l=>`<th style="text-align:center;min-width:54px">${esc(l.replace(/^\d{4}-/,''))}</th>`).join('');
  const tbody = types.map(t => {
    const cells = auto.labels.map((_,i)=>{
      const v = auto[t.key][i];
      return `<td style="text-align:center;color:${v>0?t.color:'var(--text-dim)'}">${v>0?v:'—'}</td>`;
    }).join('');
    const rowTotal = auto.labels.reduce((s,_,i)=>s+auto[t.key][i],0);
    return `<tr><td><span style="font-size:.7rem;font-weight:800;padding:2px 8px;border-radius:10px;background:${t.color}22;color:${t.color}">${t.label}</span></td>${cells}<td style="text-align:center;font-weight:700;color:${t.color}">${rowTotal||'—'}</td></tr>`;
  }).join('');
  const tfoot = auto.labels.map((_,i)=>{
    return `<td style="text-align:center;font-weight:700;color:#60a5fa">${totals[i]||'—'}</td>`;
  }).join('');
  return `
  <div style="overflow-x:auto">
  <table class="tbl tbl-nowrap" style="font-size:.78rem">
    <thead><tr><th>구분</th>${thead}<th style="text-align:center">합계</th></tr></thead>
    <tbody>${tbody}</tbody>
    <tfoot><tr style="border-top:1px solid var(--border)"><td style="font-weight:700">월 합계</td>${tfoot}<td style="text-align:center;font-weight:800;color:#ef4444">${grandTotal}</td></tr></tfoot>
  </table>
  </div>`;
}

function initCharts() {
  const isLight = document.body.classList.contains('light');
  const gridColor = isLight ? '#e2e8f0' : '#1e2d4a';
  const textColor = isLight ? '#475569' : '#94a3b8';

  Chart.defaults.color = textColor;
  Chart.defaults.borderColor = gridColor;
  Chart.defaults.font.family = "'Segoe UI', sans-serif";
  Chart.defaults.font.size = 11;

  const destroy = id => { const c = Chart.getChart(id); if (c) c.destroy(); };

  // Trend chart
  if (document.getElementById('chartTrend')) {
    destroy('chartTrend');
    const td = DB.trendData;
    new Chart('chartTrend', {
      type:'line',
      data:{
        labels:td.labels,
        datasets:[
          {label:'불량률(%)',data:td.values,borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.12)',borderWidth:2.5,pointBackgroundColor:'#2563eb',pointRadius:4,pointHoverRadius:6,tension:.4,fill:true},
          {label:'목표(%)',data:td.labels.map(()=>td.target),borderColor:'#ef4444',borderWidth:1.5,borderDash:[5,5],pointRadius:0,fill:false}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:12,padding:12,color:textColor}}},scales:{y:{min:Math.max(0,Math.min(...td.values)-.1),grid:{color:gridColor},ticks:{callback:v=>v.toFixed(2)+'%',color:textColor}},x:{grid:{display:false},ticks:{color:textColor}}}}
    });
  }

  // Donut
  if (document.getElementById('chartDonut')) {
    destroy('chartDonut');
    new Chart('chartDonut', {
      type:'doughnut',

// FONT SIZE
// ═══════════════════════════════════════════════
const BASE_FONT_PX = 14;
const FONT_MIN_PCT = 70;
const FONT_MAX_PCT = 150;
const FONT_STEP_PCT = 5;
let fontPct = parseInt(localStorage.getItem('qm_font_pct') || '100', 10);
if (!Number.isFinite(fontPct)) fontPct = 100;

function applyFontSize() {
  const px = (BASE_FONT_PX * fontPct / 100).toFixed(2);
  document.documentElement.style.fontSize = px + 'px';
  const inp = document.getElementById('fontSizeInput');
  if (inp) inp.value = String(fontPct);
  const resetBtn = document.getElementById('fontResetBtn');
  if (resetBtn) resetBtn.classList.toggle('active-size', fontPct !== 100);
  localStorage.setItem('qm_font_pct', String(fontPct));
}

function setFontSize(dir) {
  if (dir === 0) {
    fontPct = 100;
  } else {
    fontPct = Math.max(FONT_MIN_PCT, Math.min(FONT_MAX_PCT, fontPct + (dir > 0 ? FONT_STEP_PCT : -FONT_STEP_PCT)));
  }
  applyFontSize();
}

function setFontSizeInput(v) {
  const n = parseInt(v, 10);
  if (!Number.isFinite(n)) {
    applyFontSize();
    return;
  }
  const snapped = Math.round(n / FONT_STEP_PCT) * FONT_STEP_PCT;
  fontPct = Math.max(FONT_MIN_PCT, Math.min(FONT_MAX_PCT, snapped));
  applyFontSize();
}

// ── 분석 로직 ──
function buildFcAnalysis(data, groupBy) {
  const { rows, colMap } = data;
  const vendorSet = new Set();
  const periodSet = new Set();
  const matrix = {}; // period -> vendor -> {rework, scrap, extra, total}

  rows.forEach(row => {
    const vendor = String(row[colMap.vendor] || '').trim();
    if (!vendor) return;
    vendorSet.add(vendor);

    const dateVal = row[colMap.date];
    let period = '기간미상';
    const d = parseFcDate(dateVal);
    if (d) {
      if (groupBy === 'yearly')        period = `${d.getFullYear()}년`;
      else if (groupBy === 'monthly')  period = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      else                             period = `${d.getFullYear()}-W${String(getWeekNum(d)).padStart(2,'0')}`;
    }
    periodSet.add(period);

    if (!matrix[period]) matrix[period] = {};
    if (!matrix[period][vendor]) matrix[period][vendor] = {rework:0,scrap:0,extra:0,total:0};

    const rework = parseMoney(row[colMap.rework]);
    const scrap  = parseMoney(row[colMap.scrap]);
    const extra  = parseMoney(row[colMap.extra]);
    let   total  = parseMoney(row[colMap.total]);
    if (total === 0) total = rework + scrap + extra;

    matrix[period][vendor].rework += rework;
    matrix[period][vendor].scrap  += scrap;
    matrix[period][vendor].extra  += extra;
    matrix[period][vendor].total  += total;
  });

  const vendors = [...vendorSet].sort();
  const periods = [...periodSet].sort();

  const vendorTotals = {};
  vendors.forEach(v => {
    vendorTotals[v] = periods.reduce((s,p) => s + (matrix[p]?.[v]?.total||0), 0);
  });
  const grandTotal = Object.values(vendorTotals).reduce((s,v)=>s+v, 0);

  return { vendors, periods, matrix, vendorTotals, grandTotal, rowCount: rows.length };
}

function parseFcDate(val) {
  if (!val && val !== 0) return null;
  if (typeof val === 'number') {
    // Excel serial → JS date
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    if (!isNaN(d)) return d;
  }
  const s = String(val).trim();
  let m = s.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = s.match(/(\d{4})년\s*(\d{1,2})월(?:\s*(\d{1,2})일)?/);
  if (m) return new Date(+m[1], +m[2]-1, m[3]?+m[3]:1);
  m = s.match(/(\d{4})(\d{2})(\d{2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  return null;
}

function parseMoney(val) {
  if (!val && val !== 0) return 0;
  return parseFloat(String(val).replace(/[₩,\s원]/g,'')) || 0;
}

// ── 피벗 테이블 ──
function renderFcTable(analysis) {
  const { vendors, periods, matrix, vendorTotals, grandTotal } = analysis;
  if (!vendors.length || !periods.length) {
    return `<div style="text-align:center;padding:32px;color:var(--text-dim)">표시할 데이터가 없습니다. 열 매핑이 올바른지 확인하세요.</div>`;
  }
  const MAX_P = 26;
  const dp = periods.length > MAX_P ? periods.slice(-MAX_P) : periods;
  const omitted = periods.length > MAX_P ? `<div style="font-size:.74rem;color:var(--text-dim);padding:6px 0">※ 최근 ${MAX_P}개 기간만 표시 (총 ${periods.length}개 중)</div>` : '';

  const thead = dp.map(p=>`<th style="text-align:right;min-width:96px">${esc(p)}</th>`).join('');
  const tbody = vendors.map(v => {
    const cells = dp.map(p => {
      const val = matrix[p]?.[v]?.total || 0;
      return `<td style="text-align:right;${val>0?'color:#fbbf24':'color:var(--text-dim)'}">${val>0?fmtWon(val):'—'}</td>`;
    }).join('');
    const tot = vendorTotals[v]||0;
    return `<tr>
      <td style="min-width:130px"><strong>${esc(v)}</strong></td>
      ${cells}
      <td style="text-align:right"><strong style="color:#ef4444">${fmtWon(tot)}</strong></td>
    </tr>`;
  }).join('');
  const tfoot = dp.map(p => {
    const s = vendors.reduce((acc,v)=>acc+(matrix[p]?.[v]?.total||0), 0);
    return `<td style="text-align:right;font-weight:700;color:#60a5fa">${s>0?fmtWon(s):'—'}</td>`;
  }).join('');

  return `${omitted}
  <table class="tbl tbl-nowrap">
    <thead><tr><th>업체명</th>${thead}<th style="text-align:right">합계</th></tr></thead>
    <tbody>${tbody}</tbody>
    <tfoot><tr style="border-top:2px solid var(--border)">
      <td style="font-weight:700">기간 합계</td>${tfoot}
      <td style="text-align:right"><strong style="color:#ef4444">${fmtWon(grandTotal)}</strong></td>
    </tr></tfoot>
  </table>`;
}

  const PAL = ['#ef4444','#f59e0b','#22c55e','#2563eb','#a855f7','#06b6d4','#f97316','#84cc16','#ec4899','#14b8a6'];

  // 업체별 가로 막대

    destroy('chartFcVendor');
    const sv = [...analysis.vendors].sort((a,b)=>(analysis.vendorTotals[b]||0)-(analysis.vendorTotals[a]||0));

      type:'bar',

        scales:{x:{grid:{color:gc},ticks:{color:tc,callback:v=>fmtWon(v)}},y:{grid:{display:false},ticks:{color:tc}}}}
    });
  }

  // 기간별 추이 (상위 5개 업체)
  if (document.getElementById('chartFcTrend')) {
    destroy('chartFcTrend');
    const MAX_P = 20;
    const dp = analysis.periods.length > MAX_P ? analysis.periods.slice(-MAX_P) : analysis.periods;
    const top5 = [...analysis.vendors].sort((a,b)=>(analysis.vendorTotals[b]||0)-(analysis.vendorTotals[a]||0)).slice(0,5);
    new Chart('chartFcTrend', {
      type:'line',
      data:{labels:dp, datasets:top5.map((v,i)=>({
        label:v, data:dp.map(p=>analysis.matrix[p]?.[v]?.total||0),
        borderColor:PAL[i%PAL.length], backgroundColor:PAL[i%PAL.length]+'22',
        borderWidth:2.2, pointRadius:3, tension:.3, fill:false
      }))},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top',labels:{boxWidth:10,padding:8,color:tc}},
                 tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmtWon(ctx.raw)}`}}},
        scales:{y:{grid:{color:gc},beginAtZero:true,ticks:{color:tc,callback:v=>fmtWon(v)}},
                x:{grid:{display:false},ticks:{color:tc}}}}
    });
  }

  // 업체별 누적 막대
  if (document.getElementById('chartFcStack')) {
    destroy('chartFcStack');
    const MAX_P = 16;
    const dp = analysis.periods.length > MAX_P ? analysis.periods.slice(-MAX_P) : analysis.periods;
    const sv = [...analysis.vendors].sort((a,b)=>(analysis.vendorTotals[b]||0)-(analysis.vendorTotals[a]||0));
    new Chart('chartFcStack', {
      type:'bar',
      data:{labels:sv, datasets:dp.map((p,i)=>({
        label:p, data:sv.map(v=>analysis.matrix[p]?.[v]?.total||0),
        backgroundColor:PAL[i%PAL.length]+'bb', borderRadius:3
      }))},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top',labels:{boxWidth:10,padding:7,color:tc}},
                 tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmtWon(ctx.raw)}`}}},
        scales:{x:{stacked:true,grid:{color:gc},ticks:{color:tc,callback:v=>fmtWon(v)}},
                y:{stacked:true,grid:{display:false},ticks:{color:tc}}}}
    });
  }
}

// ── 파일 처리 ──
function handleExcelUpload(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  processFcFile(file);
}
function handleExcelDrop(event) {
  const file = event.dataTransfer.files[0];
  if (!file) return;
  processFcFile(file);
}
function processFcFile(file) {
  if (typeof XLSX === 'undefined') {
    alert('라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type:'array', cellDates:false });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if (!raw || raw.length < 2) { alert('데이터가 없거나 형식이 맞지 않습니다.\n헤더 행 + 데이터 행이 있는 파일을 사용하세요.'); return; }
      const headers = raw[0].map((h,i) => h ? String(h).trim() : `열${i+1}`);
      const rows = raw.slice(1).filter(r=>r.some(c=>c!=='')).map(r=>{
        const obj={};
        headers.forEach((h,i)=>{ obj[h]=r[i]??''; });
        return obj;
      });
      const colMap = detectFcColumns(headers);
      fcData = { headers, rows, colMap, fileName: file.name };
      fcView = 'monthly';
      renderFailureAnalysis();
    } catch(err) {
      alert('파일 처리 중 오류가 발생했습니다:\n' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── 열 자동 감지 ──
function detectFcColumns(headers) {
  const lw = headers.map(h => h.toLowerCase().replace(/[\s_-]/g,''));
  const find = (...pats) => {
    for (const p of pats) {
      const idx = lw.findIndex(h => h.includes(p));
      if (idx >= 0) return headers[idx];
    }
    return '';
  };
  return {
    date:   find('날짜','일자','date','발생일','접수일','연월일','일시'),
    vendor: find('업체명','업체','협력사','공급사','vendor','supplier','회사명','거래처','제조사'),
    rework: find('재작업비용','재작업','rework','재작업금액','수리비','재가공'),
    scrap:  find('폐기비용','폐기','scrap','폐기금액','불량폐기'),
    extra:  find('기타비용','기타','extra','기타금액','추가비용'),
    total:  find('총비용','합계','실패비용','총실패비용','total','sum','총액','금액','비용합계','코스트'),
  };
}

// ── 열 매핑 변경 모달 ──
function openFcColMapModal() {
  if (!fcData) return;
  const noneOpt = '(없음)';
  const opts = [noneOpt, ...fcData.headers];
  const schema = [
    {k:'date',  l:'날짜 열',      t:'select', opts},
    {k:'vendor',l:'업체명 열',    t:'select', opts},
    {k:'rework',l:'재작업비용 열',t:'select', opts},
    {k:'scrap', l:'폐기비용 열',  t:'select', opts},
    {k:'extra', l:'기타비용 열',  t:'select', opts},
    {k:'total', l:'총비용 열 (재작업+폐기+기타 대신 사용)',t:'select', opts},
  ];
  const cur = {};
  Object.entries(fcData.colMap).forEach(([k,v])=>{ cur[k]=v||noneOpt; });
  openModal('엑셀 열 매핑 설정', schema, cur, result => {
    Object.entries(result).forEach(([k,v])=>{ fcData.colMap[k] = v===noneOpt ? '' : v; });
    renderFailureAnalysis();
  });
}

function addPart() {

  });

// ═══════════════════════════════════════════════
// PARTS EXCEL IMPORT
// ═══════════════════════════════════════════════
function handlePartsExcelUpload(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  processPartsFile(file);
}
function handlePartsExcelDrop(event) {
  const file = event.dataTransfer.files[0];
  if (!file) return;
  processPartsFile(file);
}
function processPartsFile(file) {
  if (typeof XLSX === 'undefined') { alert('라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if (!raw || raw.length < 2) { alert('데이터가 없습니다. 헤더 + 데이터 행이 있는 파일을 사용하세요.'); return; }

      // 헤더 행 자동 탐지: 첫 15행 중 품번/품명 키워드가 있는 행 찾기
      const HDR_KEYWORDS = ['품번','품명','partno','partname','part_no','part_name','부품번호','부품명','자재번호','자재명','코드','품목'];
      let hdrRowIdx = 0;
      for (let i = 0; i < Math.min(raw.length, 15); i++) {
        const rowLower = raw[i].map(c => String(c||'').toLowerCase().replace(/[\s_\-\(\)]/g,''));
        if (HDR_KEYWORDS.some(k => rowLower.some(c => c.includes(k)))) { hdrRowIdx = i; break; }
      }
      const headers = raw[hdrRowIdx].map((h,i) => h ? String(h).trim() : `열${i+1}`);
      const dataRows = raw.slice(hdrRowIdx + 1).filter(r => r.some(c => c !== ''));
      const cm = detectPartsColumns(headers);
      // 열 매핑이 안 됐을 경우 경고
      if (!cm.partNo && !cm.partName) {
        alert(`품번 또는 품명 열을 찾지 못했습니다.\n검출된 열(${hdrRowIdx+1}행 기준): ${headers.join(', ')}\n\n헤더 행에 "품번", "품명" 같은 열 이름이 있는지 확인해주세요.`);
        return;
      }
      // 파싱
      const parsed = dataRows.map(r => {
        const get = col => col ? String(r[headers.indexOf(col)]||'').trim() : '';
        return {
          partNo:   get(cm.partNo),
          partName: get(cm.partName),
          maker:    get(cm.maker),
          model:    get(cm.model),
          unit:     get(cm.unit) || 'EA',
          note:     get(cm.note),
        };
      }).filter(p => p.partNo || p.partName);
      if (!parsed.length) { alert('유효한 데이터 행이 없습니다.'); return; }
      // 중복 체크 및 병합
      if (!DB.parts) DB.parts = [];
      let added = 0, updated = 0;
      parsed.forEach(p => {
        const existing = DB.parts.find(x => x.partNo && x.partNo === p.partNo);
        if (existing) {
          Object.assign(existing, p);
          updated++;
        } else {
          p.id = ++nextId;
          DB.parts.push(p);
          added++;
        }
      });
      saveData();
      refresh();
      alert(`✅ 엑셀 등록 완료\n\n신규 추가: ${added}개\n업데이트: ${updated}개\n총 등록: ${DB.parts.length}개`);
    } catch(err) {
      alert('파일 처리 중 오류가 발생했습니다:\n' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}
function detectPartsColumns(headers) {
  const lw = headers.map(h => h.toLowerCase().replace(/[\s_\-\(\)]/g,''));
  const find = (...pats) => {
    for (const p of pats) {
      const idx = lw.findIndex(h => h.includes(p));
      if (idx >= 0) return headers[idx];
    }
    return '';
  };
  return {
    partNo:   find('품번','partno','part_no','부품번호','자재번호','코드','code','번호'),
    partName: find('품명','partname','part_name','부품명','자재명','명칭','품목','name'),
    maker:    find('고객사','maker','customer','거래처','납품처','제조사','client'),
    model:    find('차종','model','모델','모델명','차량','vehicle'),
    unit:     find('단위','unit','uom'),
    note:     find('비고','note','remark','메모','memo','특이사항'),
  };
}
function clearAllParts() {
  if (!DB.parts || !DB.parts.length) return;
  if (!confirm(`등록된 ${DB.parts.length}개 부품을 모두 삭제하시겠습니까?`)) return;
  DB.parts = [];
  saveData(); refresh();
}

function updatePartsDatalist() {

  dl.innerHTML = (DB.parts||[]).map(p =>
